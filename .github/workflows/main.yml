name: Perpetual Dual Stream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-session]

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: System Setup
        run: |
          sudo apt-get update -qq
          # تم إزالة google-chrome-stable لتجنب الخطأ لأنه مثبت مسبقاً، وإضافة pulseaudio-utils
          sudo apt-get install -y -qq xvfb ffmpeg pulseaudio pulseaudio-utils unclutter > /dev/null
          # تشغيل pulseaudio بطريقة صحيحة مع إعطائه وقت للعمل قبل تحميل الـ Sink
          pulseaudio --start --exit-idle-time=-1 --disallow-exit || true
          sleep 3
          pactl load-module module-null-sink sink_name=Sink1 || true

      - name: Python Setup
        run: pip install selenium pyvirtualdisplay requests g4f curl_cffi edge-tts

      - name: Create Python Script
        run: |
          cat << 'EOF' > main.py
          import os, subprocess, time, requests, signal, csv
          from io import StringIO
          from pyvirtualdisplay import Display
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from multiprocessing import Process
          from g4f.client import Client

          # إعدادات البث
          URL1_CONTROL = "https://meja.do.am/work/url1.txt"
          APPS_SCRIPT_URL1 = "https://script.google.com/macros/s/AKfycby9TJczwYz7M-69ض00sKgp1-G8srLVVPIl-SLy-ft7Y1DdTAxs7XkzkmLGXXbBsQguKHLg/exec"
          SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRr0IRkhXkovj2TyYUN3c_dPI11CPUZ0Dt05-QU2E0uW9ZCGDXKIffmPTz-NhKzuWAjoTeQf2cxTw58/pub?output=csv"

          last_comment_index = -1
          gpt_client = Client()

          def kill_all(signum, frame):
              os._exit(0)

          signal.signal(signal.SIGTERM, kill_all)
          signal.signal(signal.SIGINT, kill_all)

          def get_url_from_file(control_url):
              try:
                  res = requests.get(f"{control_url}?t={int(time.time())}", timeout=5)
                  lines = [l.strip() for l in res.text.strip().split('\n') if l.strip()]
                  for line in lines:
                      parts = line.split()
                      if len(parts) >= 2 and parts[1] == "1":
                          return parts[0]
              except:
                  pass
              return None

          def process_new_comments():
              global last_comment_index
              try:
                  res = requests.get(SHEET_CSV_URL, timeout=10)
                  res.encoding = 'utf-8'
                  reader = csv.reader(StringIO(res.text))
                  data = list(reader)
                  
                  current_len = len(data)
                  
                  # لتجنب قراءة كل التعليقات القديمة عند بداية التشغيل
                  if last_comment_index == -1:
                      last_comment_index = current_len
                      return
                  
                  if current_len > last_comment_index:
                      for i in range(last_comment_index, current_len):
                          row = data[i]
                          if len(row) > 2:
                              username = row[0].strip()
                              comment = row[2].strip()
                              
                              if not username or not comment:
                                  continue
                              
                              print(f"[+] New comment from {username}: {comment}")
                              
                              # توجيه GPT للرد بالإنجليزية فقط كصانع محتوى ألعاب
                              prompt = f"Act as a professional and engaging gaming content creator currently live streaming. A viewer named '{username}' just commented: '{comment}'. Respond to them ONLY in English, even if their comment is in another language. Sometimes welcome them by name, answer smartly, and keep it strictly related to gaming. Keep your response short, conversational, and impactful (1 to 2 sentences max)."
                              
                              try:
                                  response = gpt_client.chat.completions.create(
                                      model="gpt-3.5-turbo",
                                      messages=[{"role": "user", "content": prompt}]
                                  )
                                  reply_text = response.choices[0].message.content.strip()
                                  print(f"[AI Reply]: {reply_text}")
                                  
                                  # تحويل النص إلى صوت واقعي بواسطة Edge-TTS (صوت Christopher المتميز للتعليق الإنجليزي)
                                  subprocess.run(['edge-tts', '--text', reply_text, '--voice', 'en-US-ChristopherNeural', '--write-media', 'reply.mp3'])
                                  
                                  # تشغيل الملف الصوتي وتوجيهه مباشرة لـ Sink1 ليظهر في البث
                                  subprocess.run(['paplay', '--device=Sink1', 'reply.mp3'])
                                  time.sleep(1) # استراحة قصيرة بين التعليقات
                              except Exception as e:
                                  print(f"Error generating AI reply or audio: {e}")
                                  
                      last_comment_index = current_len
              except Exception as e:
                  print(f"Error fetching comments: {e}")

          def active_wait(driver, duration, control_url=None):
              start_time = time.time()
              last_url = driver.current_url
              last_comment_check = time.time()
              
              while time.time() - start_time < duration:
                  try:
                      driver.find_element(By.TAG_NAME, 'body').click()
                  except:
                      pass
                      
                  if control_url:
                      new_url = get_url_from_file(control_url)
                      if new_url and new_url != last_url:
                          driver.delete_all_cookies()
                          driver.execute_script("window.localStorage.clear();")
                          driver.execute_script("window.sessionStorage.clear();")
                          driver.execute_cdp_cmd('Network.clearBrowserCache', {})
                          driver.execute_cdp_cmd('Network.clearBrowserCookies', {})
                          driver.get(new_url)
                          last_url = new_url
                          
                  # فحص التعليقات الجديدة كل 10 ثوانٍ
                  if time.time() - last_comment_check > 10:
                      process_new_comments()
                      last_comment_check = time.time()
                      
                  time.sleep(3)

          def start_stream(youtube_key, kick_key, sink_name, control_url, apps_script_url, initial_delay=0):
              try:
                  print("Triggering Google Apps Script to create a new stream...")
                  requests.get(apps_script_url, timeout=60, allow_redirects=True)
                  print("Apps Script triggered. Waiting for stream to be ready...")
                  time.sleep(10)
              except Exception as e:
                  print(f"Error triggering Apps Script: {e}")

              if initial_delay > 0:
                  time.sleep(initial_delay)
              
              width, height = 720, 1280
              os.environ['PULSE_SINK'] = sink_name
              disp = Display(visible=0, size=(width, height), backend='xvfb')
              disp.start()
              subprocess.Popen(['unclutter', '-idle', '0'])
              ffmpeg_proc = None
              try:
                  target_url = get_url_from_file(control_url)
                  if target_url:
                      opts = Options()
                      opts.add_argument('--no-sandbox')
                      opts.add_argument('--disable-dev-shm-usage')
                      opts.add_argument('--autoplay-policy=no-user-gesture-required')
                      opts.add_argument('--disable-notifications')
                      opts.add_argument('--disable-infobars')
                      opts.add_argument('--disable-extensions')
                      opts.add_argument('--disable-popup-blocking')
                      opts.add_argument('--disable-features=TranslateUI')
                      opts.add_argument('--disable-gpu')
                      opts.add_experimental_option("excludeSwitches", ["enable-automation"])
                      opts.add_experimental_option('useAutomationExtension', False)
                      opts.add_argument('--disable-blink-features=AutomationControlled')
                      opts.add_argument('--hide-scrollbars')
                      opts.add_argument(f'--app={target_url}')

                      driver = webdriver.Chrome(options=opts)
                      time.sleep(8)

                      # إعدادات روابط البث المزدوج (Dual Stream)
                      outputs = []
                      if youtube_key:
                          outputs.append(f"[f=flv:onfail=ignore]rtmp://a.rtmp.youtube.com/live2/{youtube_key}")
                      if kick_key:
                          outputs.append(f"[f=flv:onfail=ignore]rtmps://fa723fc1b171.global-contribute.live-video.net/app/{kick_key}")
                      
                      tee_output = "|".join(outputs)

                      ffmpeg_cmd = [
                          'ffmpeg', '-y',
                          '-thread_queue_size', '1024',
                          '-f', 'x11grab',
                          '-framerate', '60',
                          '-s', f'{width}x{height}',
                          '-i', f":{disp.display}",
                          '-f', 'pulse',
                          '-i', f"{sink_name}.monitor",
                          '-c:v', 'libx264',
                          '-preset', 'ultrafast',
                          '-tune', 'zerolatency',
                          '-b:v', '4000k',
                          '-maxrate', '4000k',
                          '-bufsize', '8000k',
                          '-r', '60',
                          '-g', '120',
                          '-keyint_min', '120',
                          '-sc_threshold', '0',
                          '-pix_fmt', 'yuv420p',
                          '-c:a', 'aac',
                          '-b:a', '128k',
                          '-map', '0:v',
                          '-map', '1:a',
                          '-f', 'tee',
                          tee_output
                      ]

                      ffmpeg_proc = subprocess.Popen(ffmpeg_cmd)
                      active_wait(driver, 3600, control_url)
              finally:
                  if ffmpeg_proc:
                      ffmpeg_proc.kill()
                  try:
                      driver.quit()
                  except:
                      pass
                  disp.stop()

          if __name__ == "__main__":
              R1 = os.environ.get('R1')
              KICK_KEY = os.environ.get('KICK_KEY')
              if R1 or KICK_KEY:
                  start_stream(R1, KICK_KEY, "Sink1", URL1_CONTROL, APPS_SCRIPT_URL1, 0)
          EOF

      - name: Run Streaming Script
        env:
          R1: ${{ secrets.R1 }}
          KICK_KEY: ${{ secrets.KICK_KEY }}
        run: python main.py

      - name: Wait & Restart
        if: always()
        run: |
          python - <<'PYTHON'
          import time, signal, sys
          stop = False
          def handler(signum, frame):
              global stop
              stop = True
          signal.signal(signal.SIGTERM, handler)
          signal.signal(signal.SIGINT, handler)
          wait_seconds = 60
          for _ in range(0, wait_seconds):
              if stop: sys.exit(0)
              time.sleep(1)
          PYTHON

          curl -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart-session"}'
