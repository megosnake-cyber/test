name: Perpetual Dual Stream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-session]

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # تحديد أقصى مدة للوظيفة بـ 6 ساعات لضمان عمل جلسة الـ 5 ساعات براحة
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: System Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg pulseaudio google-chrome-stable unclutter > /dev/null
          pulseaudio -D --exit-idle-time=-1 --disallow-exit || true
          pactl load-module module-null-sink sink_name=Sink1

      - name: Python Setup
        # تم إضافة elevenlabs و pydub للمكتبات المطلوبة
        run: pip install selenium pyvirtualdisplay requests elevenlabs pydub

      - name: Create Python Script
        run: |
          cat << 'EOF' > main.py
          import os, subprocess, time, requests, signal, random, urllib.parse
          from multiprocessing import Process
          from pyvirtualdisplay import Display
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from pydub import AudioSegment
          from pydub.generators import WhiteNoise
          from elevenlabs.client import ElevenLabs

          # ==========================================
          # إعدادات البث
          # ==========================================
          URL1_CONTROL = "https://meja.do.am/work/url1.txt"
          APPS_SCRIPT_URL1 = "https://script.google.com/macros/s/AKfycbyCHeVYLYsPGV-F95iiYStOXsgbYM1H92ZGEvveA7r3hq93A0AfiS1WQnnN8l3R7GLA/exec"
          
          URL2_CONTROL = "https://meja.do.am/work/url2.txt"
          APPS_SCRIPT_URL2 = "https://script.google.com/macros/s/AKfycbwdVaCnCfcwFVnyY1wEOOWQawopiDTDEzfS2wcPMhWAG3VBHNJ-4AAwIKX80NjBWaMJ/exec"

          TOTAL_SESSION_TIME = 5 * 3600 

          # ==========================================
          # إعدادات المعلق الصوتي الذكي والشيت
          # ==========================================
          WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyq6hs0txpgIqZzyB8ySyo2RhMPT0sumCJgH9UMQYN11NHW03BEtE4kjzEGLHZt1RRq2Q/exec"
          VOICE_ID = "CwhRBWXzGAHq8TQ4Fs17"

          def kill_all(signum, frame):
              os._exit(0)

          signal.signal(signal.SIGTERM, kill_all)
          signal.signal(signal.SIGINT, kill_all)

          def get_url_from_file(control_url):
              try:
                  res = requests.get(f"{control_url}?t={int(time.time())}", timeout=5)
                  lines = [l.strip() for l in res.text.strip().split('\n') if l.strip()]
                  for line in lines:
                      parts = line.split()
                      if len(parts) >= 2 and parts[1] == "1":
                          return parts[0]
              except:
                  pass
              return None

          def active_wait(driver, duration, control_url=None):
              start_time = time.time()
              last_url = driver.current_url
              while time.time() - start_time < duration:
                  try:
                      driver.find_element(By.TAG_NAME, 'body').click()
                  except:
                      pass
                  if control_url:
                      new_url = get_url_from_file(control_url)
                      if new_url and new_url != last_url:
                          driver.delete_all_cookies()
                          driver.execute_script("window.localStorage.clear();")
                          driver.execute_script("window.sessionStorage.clear();")
                          driver.execute_cdp_cmd('Network.clearBrowserCache', {})
                          driver.execute_cdp_cmd('Network.clearBrowserCookies', {})
                          driver.get(new_url)
                          last_url = new_url
                  time.sleep(3)

          # ==========================================
          # دوال المعلق الصوتي (AI Bot)
          # ==========================================
          def get_remote_api_keys():
              API_FILE_URL = "https://meja.do.am/aimp3/api.txt"
              try:
                  response = requests.get(API_FILE_URL)
                  if response.status_code == 200:
                      return [k.strip() for k in response.text.splitlines() if len(k.strip()) > 10]
              except:
                  return []

          def is_english_username(username):
              try:
                  username.encode('ascii')
                  return True
              except UnicodeEncodeError:
                  return False

          def get_gpt_reply(comment, username):
              try:
                  clean_name = username.replace('@', '').strip()
                  if is_english_username(clean_name):
                      placement = random.choice(["before", "after", "none"])
                  else:
                      placement = "none" 
                      
                  if placement == "before":
                      name_instruction = f"Casually start with the user '{clean_name}' (e.g. 'Yo {clean_name}', 'Wait, {clean_name}...')."
                  elif placement == "after":
                      name_instruction = f"Casually end by mentioning '{clean_name}'."
                  else:
                      name_instruction = "Do NOT mention any username."

                  prompt = f"""You are a young, highly entertaining live streamer. 
                  Read this viewer comment: '{comment}'. If it's not in English, understand it first, but REPLY ONLY IN ENGLISH.
                  Use natural American streamer slang (bro, chat, wild, legit, W, L). 
                  CRITICAL REALISM RULE: You MUST include human filler words like 'uh', 'um', 'like', or 'wait' to sound 100% unscripted and real. 
                  Laugh (say 'haha' or 'pfft') if it's funny, act hyped, or act genuine if it's sad.
                  CRITICAL RULE 2: MAXIMUM 20 WORDS TOTAL. Extremely short!
                  {name_instruction}
                  IMPORTANT: NO emojis. ONLY output the exact words you will speak."""
                  
                  encoded_prompt = urllib.parse.quote(prompt)
                  url = f"https://text.pollinations.ai/{encoded_prompt}"
                  
                  response = requests.get(url)
                  if response.status_code == 200:
                      return response.text.strip()
                      
              except Exception as e:
                  print(f"⚠️ AI Error: {e}")
                  
              return "Um, appreciate the comment, bro!" 

          def generate_audio_official(text, api_keys, filename):
              last_error_msg = ""
              for key in api_keys:
                  try:
                      client = ElevenLabs(api_key=key)
                      audio_generator = client.text_to_speech.convert(
                          text=text,
                          voice_id=VOICE_ID,
                          model_id="eleven_multilingual_v2",
                          output_format="mp3_44100_128"
                      )
                      with open(filename, "wb") as f:
                          for chunk in audio_generator:
                              if chunk: f.write(chunk)
                      return True, ""
                  except Exception as e:
                      last_error_msg = str(e)
                      continue
              return False, last_error_msg

          def make_bad_mic_effect(filename):
              try:
                  audio = AudioSegment.from_mp3(filename)
                  slow_audio = audio._spawn(audio.raw_data, overrides={
                      "frame_rate": int(audio.frame_rate * 0.90)
                  }).set_frame_rate(audio.frame_rate)
                  
                  random_noise_level = random.randint(35, 42)
                  noise = WhiteNoise().to_audio_segment(duration=len(slow_audio)) - random_noise_level
                  mixed = slow_audio.overlay(noise)
                  mixed = mixed.high_pass_filter(250).low_pass_filter(3500)
                  mixed.export(filename, format="mp3")
              except Exception as e:
                  print(f"⚠️ Mic Effect Error: {e}")

          def run_continuous_ai_bot(sink_name):
              os.environ['PULSE_SINK'] = sink_name
              processed_comments = set()
              print("🤖 Bot Voice Started in Background...")
              
              while True:
                  api_keys = get_remote_api_keys()
                  if not api_keys:
                      time.sleep(30)
                      continue

                  try:
                      response = requests.get(WEB_APP_URL)
                      data = response.json()
                      rows = data if isinstance(data, list) else data.get('data', [])

                      if rows:
                          for index, row in enumerate(rows):
                              try:
                                  username = str(row[0]).strip()
                                  comment = str(row[2]).strip()
                                  unique_id = f"{username}_{comment}"

                                  if unique_id in processed_comments:
                                      continue 

                                  print(f"👤 Comment from: {username} | 💬 {comment}")
                                  ai_reply = get_gpt_reply(comment, username)
                                  print(f"📝 Reply: {ai_reply}")

                                  filename = f"reply_{index}.mp3"
                                  is_success, error_msg = generate_audio_official(ai_reply, api_keys, filename)
                                  
                                  if is_success:
                                      make_bad_mic_effect(filename)
                                      subprocess.run(['ffplay', '-nodisp', '-autoexit', '-loglevel', 'quiet', filename])
                                      processed_comments.add(unique_id)
                                  
                              except IndexError:
                                  continue
                  except Exception as e:
                      pass
                  time.sleep(20)

          # ==========================================
          # دالة البث الرئيسية
          # ==========================================
          def start_stream(youtube_key, kick_key, sink_name, control_url, apps_script_url, initial_delay=0, is_first_stream=False):
              try:
                  print(f"Triggering Google Apps Script to create a new stream... ({apps_script_url})")
                  res = requests.get(apps_script_url, timeout=60, allow_redirects=True)
                  print("Apps Script triggered. Waiting for stream to be ready...")
                  
                  # === إرسال LIVE_ID إلى جوجل شيت في البث الأول فقط ===
                  if is_first_stream:
                      live_id = res.text.strip()
                      # نتحقق أن الرد هو ID حقيقي وليس رسالة خطأ طويلة
                      if live_id and len(live_id) <= 20:
                          print(f"📡 Captured LIVE_ID: {live_id}. Sending to Google Sheet...")
                          try:
                              requests.get(f"{WEB_APP_URL}?LIVE_ID={live_id}", timeout=10)
                              print("✅ LIVE_ID sent to Google Sheet successfully.")
                          except Exception as e:
                              print(f"⚠️ Failed to send LIVE_ID to Sheet: {e}")
                  # ===================================================

                  time.sleep(10)
              except Exception as e:
                  print(f"Error triggering Apps Script: {e}")

              if initial_delay > 0:
                  time.sleep(initial_delay)
              
              width, height = 720, 1280
              os.environ['PULSE_SINK'] = sink_name
              disp = Display(visible=0, size=(width, height), backend='xvfb')
              disp.start()
              subprocess.Popen(['unclutter', '-idle', '0'])
              
              ffmpeg_proc = None
              bot_process = None
              fan_process = None
              
              stream_duration = random.randint(6000, 8100)
              print(f"🎯 Target Stream Duration: {stream_duration} seconds ({stream_duration/60:.2f} minutes).")

              if is_first_stream:
                  fan_cmd = [
                      'ffplay', '-f', 'lavfi', 
                      '-i', 'anoisesrc=a=0.015:c=brown, tremolo=f=0.05:d=0.4', 
                      '-nodisp', '-loop', '0', '-loglevel', 'quiet'
                  ]
                  fan_env = os.environ.copy()
                  fan_env['PULSE_SINK'] = sink_name
                  fan_process = subprocess.Popen(fan_cmd, env=fan_env)
                  print("🌬️ Realistic Background Fan Noise started.")

                  bot_process = Process(target=run_continuous_ai_bot, args=(sink_name,))
                  bot_process.start()

              try:
                  target_url = get_url_from_file(control_url)
                  if target_url:
                      opts = Options()
                      opts.add_argument('--no-sandbox')
                      opts.add_argument('--disable-dev-shm-usage')
                      opts.add_argument('--autoplay-policy=no-user-gesture-required')
                      opts.add_argument('--disable-notifications')
                      opts.add_argument('--disable-infobars')
                      opts.add_argument('--disable-extensions')
                      opts.add_argument('--disable-popup-blocking')
                      opts.add_argument('--disable-features=TranslateUI')
                      opts.add_argument('--disable-gpu')
                      opts.add_experimental_option("excludeSwitches", ["enable-automation"])
                      opts.add_experimental_option('useAutomationExtension', False)
                      opts.add_argument('--disable-blink-features=AutomationControlled')
                      opts.add_argument('--hide-scrollbars')
                      opts.add_argument(f'--app={target_url}')

                      driver = webdriver.Chrome(options=opts)
                      time.sleep(8)

                      outputs = []
                      if youtube_key:
                          outputs.append(f"[f=flv:onfail=ignore]rtmp://a.rtmp.youtube.com/live2/{youtube_key}")
                      if kick_key:
                          outputs.append(f"[f=flv:onfail=ignore]rtmps://fa723fc1b171.global-contribute.live-video.net/app/{kick_key}")
                      
                      tee_output = "|".join(outputs)

                      ffmpeg_cmd = [
                          'ffmpeg', '-y',
                          '-thread_queue_size', '1024',
                          '-f', 'x11grab',
                          '-framerate', '60',
                          '-s', f'{width}x{height}',
                          '-i', f":{disp.display}",
                          '-f', 'pulse',
                          '-i', f"{sink_name}.monitor",
                          '-c:v', 'libx264',
                          '-preset', 'ultrafast',
                          '-tune', 'zerolatency',
                          '-b:v', '4000k',
                          '-maxrate', '4000k',
                          '-bufsize', '8000k',
                          '-r', '60',
                          '-g', '120',
                          '-keyint_min', '120',
                          '-sc_threshold', '0',
                          '-pix_fmt', 'yuv420p',
                          '-c:a', 'aac',
                          '-b:a', '128k',
                          '-map', '0:v',
                          '-map', '1:a',
                          '-f', 'tee',
                          tee_output
                      ]

                      ffmpeg_proc = subprocess.Popen(ffmpeg_cmd)
                      active_wait(driver, stream_duration, control_url)
              finally:
                  if fan_process:
                      fan_process.terminate()
                      print("🛑 Fan Noise stopped.")
                  if bot_process:
                      bot_process.terminate()
                      print("🛑 AI Bot stopped.")
                  if ffmpeg_proc:
                      ffmpeg_proc.kill()
                  try:
                      driver.quit()
                  except:
                      pass
                  disp.stop()
                  print("🛑 Stream ended successfully.")

          if __name__ == "__main__":
              session_start = time.time()
              
              R1 = os.environ.get('R1')
              R2 = os.environ.get('R2')
              KICK_KEY = os.environ.get('KICK_KEY')
              
              if R1 or KICK_KEY:
                  print("▶️ Starting First Stream...")
                  # is_first_stream=True مخصصة فقط للبث الأول ليعمل التعليق والمروحة وإرسال הـ LIVE_ID
                  start_stream(R1, KICK_KEY, "Sink1", URL1_CONTROL, APPS_SCRIPT_URL1, 0, is_first_stream=True)
              
              if R2:
                  wait_time = random.randint(600, 1200)
                  print(f"⏳ Waiting for {wait_time} seconds ({wait_time/60:.2f} minutes) before starting the second stream...")
                  time.sleep(wait_time)
                  
                  print("▶️ Starting Second Stream...")
                  start_stream(R2, None, "Sink1", URL2_CONTROL, APPS_SCRIPT_URL2, 0, is_first_stream=False)
              
              elapsed = time.time() - session_start
              remaining = TOTAL_SESSION_TIME - elapsed
              
              if remaining > 0:
                  print(f"⏳ Waiting for {remaining:.0f} seconds to finish the 5-hour session limit...")
                  while remaining > 0:
                      time.sleep(min(60, remaining))
                      remaining -= 60
                      if int(remaining) % 600 < 60 and remaining > 0:
                          print(f"🔄 Session active... {int(remaining)} seconds left before restart.")
              
              print("✅ 5-hour session completed. Ready to trigger restart.")
          EOF

      - name: Run Streaming Script
        env:
          R1: ${{ secrets.R1 }}
          R2: ${{ secrets.R2 }}
          KICK_KEY: ${{ secrets.KICK_KEY }}
        run: python main.py

      - name: Wait & Restart
        if: always()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart-session"}'
