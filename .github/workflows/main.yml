name: Perpetual Dual Stream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-session]

concurrency:
  group: streaming-group
  cancel-in-progress: true

env:
  # نظام التحكم في تشغيل أو إيقاف البثوث (1 = شغال | 0 = متوقف)
  ENABLE_STREAM2: 1

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🔢 Initialize System States
        run: |
          if [ ! -f hashtag.txt ]; then
            echo "32" > hashtag.txt
          fi
          if [ ! -f current_stream.txt ]; then
            echo "1" > current_stream.txt
          fi

      - name: System Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg pulseaudio google-chrome-stable unclutter > /dev/null
          pulseaudio -D --exit-idle-time=-1 --disallow-exit || true
          pactl load-module module-null-sink sink_name=Sink1

      - name: Python Setup
        run: pip install selenium pyvirtualdisplay requests

      - name: Create Python Script
        run: |
          cat << 'EOF' > main.py
          import os, subprocess, time, requests, signal, random, urllib.parse, sys
          from pyvirtualdisplay import Display
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By

          # ==========================================
          # إعدادات البث والمروحة وروابط التحكم
          # ==========================================
          MASTER_CONTROL_URL = "https://meja.do.am/work/lives.txt"

          # قائمة روابط النشر (Apps Script) الخاصة بكل بث
          # قم بتعديل الروابط من 2 إلى 5 لتناسب كل بث كما طلبت
          APPS_SCRIPTS = {
              1: "https://script.google.com/macros/s/AKfycbyV2MqrIlEYB7MHsPHWK5TiId5Pb5S7eRoWmHyt68J8KClaPI9nc3IWc6cVaJuNqS9J/exec",
              2: "https://script.google.com/macros/s/AKfycbwwIHi7mF-ftkiwt4uxGgE16_igsQs5xSdPeUn5vytaivsB13uaSlg0uHBR0HNtzOKy/exec",
              3: "https://script.google.com/macros/s/AKfycbzPVHlK8E9-QJB2WxHvTWTbsFKC4f_rzU0l5zdoVxbahwjbnI2RqFktAQjKJvsOnSXpbQ/exec",
              4: "https://script.google.com/macros/s/AKfycbzEsV7l7Vu29PkOYiolM1sou8tIemc_0fiRab9Voa6l7TAF4b_a4yMZqSwdnpRvG5qE/exec4",
              5: "https://script.google.com/macros/s/AKfycbzEsV7l7Vu29PkOYiolM1sou8tIemc_0fiRab9Voa6l7TAF4b_a4yMZqSwdnpRvG5qE/exec5"
          }

          TOTAL_SESSION_TIME = 5 * 3600 

          # تحكم في صوت مروحة الكمبيوتر
          FAN_VOLUME = 0.08 

          def kill_all(signum, frame):
              os._exit(0)

          signal.signal(signal.SIGTERM, kill_all)
          signal.signal(signal.SIGINT, kill_all)

          def get_stream_config(index):
              try:
                  res = requests.get(f"{MASTER_CONTROL_URL}?t={int(time.time())}", timeout=10)
                  lines = [l.strip() for l in res.text.strip().split('\n') if l.strip()]
                  if index - 1 < len(lines):
                      parts = lines[index - 1].split()
                      if len(parts) >= 2:
                          return parts[0], parts[1] # إرجاع الرابط، وحالة البث (0 أو 1)
              except Exception as e:
                  print(f"Error reading control file: {e}")
              return None, None

          def active_wait(driver, duration, stream_index):
              start_time = time.time()
              last_check_time = 0
              last_url = driver.current_url
              
              while time.time() - start_time < duration:
                  try:
                      driver.find_element(By.TAG_NAME, 'body').click()
                  except:
                      pass
                  
                  current_time = time.time()
                  if current_time - last_check_time > 10: # فحص حالة البث كل 10 ثواني
                      last_check_time = current_time
                      new_url, status = get_stream_config(stream_index)
                      
                      if status == "0":
                          print(f"🛑 Control file requested STOP (status=0) for stream {stream_index}. Ending stream...")
                          break # إنهاء حلقة الانتظار لإيقاف البث فوراً
                      
                      if new_url and status == "1" and new_url != last_url:
                          try:
                              driver.delete_all_cookies()
                              driver.execute_script("window.localStorage.clear();")
                              driver.execute_script("window.sessionStorage.clear();")
                              driver.execute_cdp_cmd('Network.clearBrowserCache', {})
                              driver.execute_cdp_cmd('Network.clearBrowserCookies', {})
                              driver.get(new_url)
                              last_url = new_url
                              print(f"🔄 URL updated dynamically to: {new_url}")
                          except Exception as e:
                              pass
                  
                  time.sleep(5)

          # ==========================================
          # دالة البث الرئيسية 
          # ==========================================
          def start_stream(youtube_key, sink_name, stream_index, apps_script_url, min_dur, max_dur, stream_title=None, initial_delay=0):
              if initial_delay > 0:
                  time.sleep(initial_delay)
              
              os.environ['PULSE_SINK'] = sink_name
              
              # الشاشة الخاصة باللعبة بمقاس 720x1280 بالطول
              disp1 = Display(visible=0, size=(720, 1280), backend='xvfb')
              disp1.start()
              
              subprocess.Popen(['unclutter', '-idle', '0', '-display', f":{disp1.display}"])
              
              ffmpeg_proc = None
              fan_process = None
              driver1 = None
              
              stream_duration = random.randint(min_dur, max_dur)
              print(f"🎯 Target Stream Duration: {stream_duration} seconds ({stream_duration/60:.2f} minutes).")

              try:
                  opts = Options()
                  opts.add_argument('--no-sandbox')
                  opts.add_argument('--disable-dev-shm-usage')
                  opts.add_argument('--autoplay-policy=no-user-gesture-required')
                  opts.add_argument('--disable-notifications')
                  opts.add_argument('--disable-infobars')
                  opts.add_argument('--disable-extensions')
                  opts.add_argument('--disable-popup-blocking')
                  opts.add_argument('--disable-features=TranslateUI')
                  opts.add_argument('--disable-gpu')
                  opts.add_argument('--disable-software-rasterizer')
                  opts.add_argument('--disable-gpu-compositing')
                  
                  opts.add_experimental_option("excludeSwitches", ["enable-automation"])
                  opts.add_experimental_option('useAutomationExtension', False)
                  opts.add_argument('--disable-blink-features=AutomationControlled')
                  opts.add_argument('--hide-scrollbars')
                  opts.add_argument('--kiosk')

                  # تشغيل متصفح اللعبة
                  os.environ['DISPLAY'] = f":{disp1.display}"
                  driver1 = webdriver.Chrome(options=opts)
                  
                  separator = "&" if "?" in apps_script_url else "?"
                  trigger_url = f"{apps_script_url}{separator}nocache={int(time.time())}"
                  if stream_title:
                      trigger_url += f"&title={urllib.parse.quote(stream_title)}"
                      
                  print(f"🔗 Opening Publishing Link in Game Browser: {trigger_url}")
                  driver1.get(trigger_url)
                  
                  print("⏳ Waiting 10 seconds for stream setup...")
                  time.sleep(10)
                  
                  target_url, status = get_stream_config(stream_index)
                  if target_url:
                      print(f"📺 Navigating to Game Content: {target_url}")
                      driver1.get(target_url)
                      time.sleep(8)

                  # تشغيل صوت المروحة
                  fan_cmd = [
                      'ffplay', '-f', 'lavfi', 
                      '-i', f'anoisesrc=a={FAN_VOLUME}:c=pink,lowpass=f=800,tremolo=f=0.04:d=0.6', 
                      '-nodisp', '-loop', '0', '-loglevel', 'quiet'
                  ]
                  fan_env = os.environ.copy()
                  fan_env['PULSE_SINK'] = sink_name
                  fan_process = subprocess.Popen(fan_cmd, env=fan_env)

                  # التسجيل المباشر للشاشة بدقة 720x1280
                  ffmpeg_cmd = [
                      'ffmpeg', '-y',
                      '-nostats', '-loglevel', 'error',
                      '-thread_queue_size', '512',
                      '-f', 'x11grab',
                      '-framerate', '60',
                      '-video_size', '720x1280',
                      '-i', f":{disp1.display}",
                      '-thread_queue_size', '512',
                      '-f', 'pulse',
                      '-i', f"{sink_name}.monitor",
                      '-map', '0:v',
                      '-map', '1:a',
                      '-c:v', 'libx264',
                      '-preset', 'ultrafast',
                      '-tune', 'zerolatency',
                      '-fps_mode', 'cfr',
                      '-b:v', '3000k',
                      '-maxrate', '3000k',
                      '-bufsize', '6000k',
                      '-r', '60',
                      '-g', '120',
                      '-keyint_min', '120',
                      '-sc_threshold', '0',
                      '-pix_fmt', 'yuv420p',
                      '-c:a', 'aac',
                      '-b:a', '128k',
                      '-f', 'flv',
                      f"rtmp://a.rtmp.youtube.com/live2/{youtube_key}"
                  ]

                  ffmpeg_proc = subprocess.Popen(ffmpeg_cmd)
                  active_wait(driver1, stream_duration, stream_index)

              except Exception as e:
                  print(f"Stream encountered an error: {e}")
              finally:
                  if fan_process:
                      fan_process.terminate()
                  if ffmpeg_proc:
                      ffmpeg_proc.kill()
                  try:
                      if driver1: driver1.quit()
                  except:
                      pass
                  disp1.stop()
                  print("🛑 Stream ended successfully.")

          if __name__ == "__main__":
              session_start = time.time()
              ENABLE_STREAM2 = os.environ.get('ENABLE_STREAM2', '1') == '1'
              
              # قراءة رقم البث الحالي (من 1 إلى 5)
              try:
                  with open("current_stream.txt", "r") as f:
                      stream_index = int(f.read().strip())
              except:
                  stream_index = 1
                  
              # التأكد من أن الرقم في النطاق الصحيح
              if stream_index < 1 or stream_index > 5:
                  stream_index = 1
                  
              current_key = os.environ.get(f'R{stream_index}')
              apps_script_url = APPS_SCRIPTS.get(stream_index, APPS_SCRIPTS[1])
              
              if ENABLE_STREAM2 and current_key:
                  try:
                      with open("hashtag.txt", "r") as f:
                          hashtag_num = int(f.read().strip())
                  except:
                      hashtag_num = 32
                      
                  stream_title = f"Snake game breaks world record #{hashtag_num}"
                  
                  # فحص حالة البث من الملف قبل البدء
                  _, init_status = get_stream_config(stream_index)
                  
                  if init_status == "0":
                      print(f"⚠️ Stream R{stream_index} is set to 0 in control file. Skipping to next stream...")
                  else:
                      print(f"🚀 Starting Stream Session for R{stream_index}...")
                      start_stream(current_key, "Sink1", stream_index, apps_script_url, TOTAL_SESSION_TIME, TOTAL_SESSION_TIME, stream_title=stream_title, initial_delay=0)
                      
                      # حفظ الهاشتاج فقط إذا تم تشغيل البث
                      with open("hashtag.txt", "w") as f:
                          f.write(str(hashtag_num + 1))
                          
                  # التبديل للبث التالي للجلسة القادمة (سواء اشتغل البث أو تم تخطيه)
                  next_index = stream_index + 1 if stream_index < 5 else 1
                  with open("current_stream.txt", "w") as f:
                      f.write(str(next_index))
              else:
                  print(f"⚠️ Stream key for R{stream_index} is missing or stream is disabled.")
                  next_index = stream_index + 1 if stream_index < 5 else 1
                  with open("current_stream.txt", "w") as f:
                      f.write(str(next_index))
              
              # انتظار الوقت المتبقي فقط إذا لم يتم تخطي البث
              _, final_status = get_stream_config(stream_index)
              if final_status != "0":
                  elapsed = time.time() - session_start
                  remaining = TOTAL_SESSION_TIME - elapsed
                  if remaining > 0:
                      print(f"⏳ Waiting {remaining:.0f}s to finish session...")
                      while remaining > 0:
                          time.sleep(min(60, remaining))
                          remaining -= 60
          EOF

      - name: Run Streaming Script
        env:
          R1: ${{ secrets.R1 }}
          R2: ${{ secrets.R2 }}
          R3: ${{ secrets.R3 }}
          R4: ${{ secrets.R4 }}
          R5: ${{ secrets.R5 }}
          ENABLE_STREAM2: ${{ env.ENABLE_STREAM2 }}
        run: python main.py

      - name: 💾 Commit Updated State Files
        if: always()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add hashtag.txt current_stream.txt
          git commit -m "Update stream state and hashtag" || echo "No changes to commit"
          git push

      - name: Wait & Restart
        if: always()
        run: |
          python - <<'PYTHON'
          import time, signal, sys
          stop = False
          def handler(signum, frame):
              global stop
              stop = True
          signal.signal(signal.SIGTERM, handler)
          signal.signal(signal.SIGINT, handler)
          wait_seconds = 60
          for _ in range(0, wait_seconds):
              if stop: sys.exit(0)
              time.sleep(1)
          PYTHON

          curl -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart-session"}'
