name: Perpetual Dual Stream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-session]

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # تحديد أقصى مدة للوظيفة بـ 6 ساعات لضمان عمل جلسة الـ 5 ساعات براحة
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: System Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg pulseaudio google-chrome-stable unclutter > /dev/null
          pulseaudio -D --exit-idle-time=-1 --disallow-exit || true
          pactl load-module module-null-sink sink_name=Sink1

      - name: Python Setup
        run: pip install selenium pyvirtualdisplay requests elevenlabs pydub

      - name: Create Python Script
        run: |
          cat << 'EOF' > main.py
          import os, subprocess, time, requests, signal, random, urllib.parse, re
          from multiprocessing import Process
          from pyvirtualdisplay import Display
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from pydub import AudioSegment
          from pydub.generators import WhiteNoise
          from elevenlabs.client import ElevenLabs

          # ==========================================
          # إعدادات البث
          # ==========================================
          URL1_CONTROL = "https://meja.do.am/work/url1.txt"
          APPS_SCRIPT_URL1 = "https://script.google.com/macros/s/AKfycbyCHeVYLYsPGV-F95iiYStOXsgbYM1H92ZGEvveA7r3hq93A0AfiS1WQnnN8l3R7GLA/exec"
          
          URL2_CONTROL = "https://meja.do.am/work/url2.txt"
          APPS_SCRIPT_URL2 = "https://script.google.com/macros/s/AKfycbwdVaCnCfcwFVnyY1wEOOWQawopiDTDEzfS2wcPMhWAG3VBHNJ-4AAwIKX80NjBWaMJ/exec"

          TOTAL_SESSION_TIME = 5 * 3600 

          # ==========================================
          # إعدادات المعلق الصوتي الذكي والشيت
          # ==========================================
          WEB_APP_URL = "https://script.google.com/macros/s/AKfycby-1VgIowDBtMCaY4IOCriEG8YRIIQqcB9cXvf7KmbkfZEnG4iD1Hg66HieuQ86xFVH8g/exec"
          VOICE_ID = "CwhRBWXzGAHq8TQ4Fs17"

          def kill_all(signum, frame):
              os._exit(0)

          signal.signal(signal.SIGTERM, kill_all)
          signal.signal(signal.SIGINT, kill_all)

          def get_url_from_file(control_url):
              try:
                  res = requests.get(f"{control_url}?t={int(time.time())}", timeout=5)
                  lines = [l.strip() for l in res.text.strip().split('\n') if l.strip()]
                  for line in lines:
                      parts = line.split()
                      if len(parts) >= 2 and parts[1] == "1":
                          return parts[0]
              except:
                  pass
              return None

          def active_wait(driver, duration, control_url=None):
              start_time = time.time()
              last_url = driver.current_url
              while time.time() - start_time < duration:
                  try:
                      driver.find_element(By.TAG_NAME, 'body').click()
                  except:
                      pass
                  if control_url:
                      new_url = get_url_from_file(control_url)
                      if new_url and new_url != last_url:
                          driver.delete_all_cookies()
                          driver.execute_script("window.localStorage.clear();")
                          driver.execute_script("window.sessionStorage.clear();")
                          driver.execute_cdp_cmd('Network.clearBrowserCache', {})
                          driver.execute_cdp_cmd('Network.clearBrowserCookies', {})
                          driver.get(new_url)
                          last_url = new_url
                  time.sleep(3)

          def get_remote_api_keys():
              API_FILE_URL = "https://meja.do.am/aimp3/api.txt"
              try:
                  response = requests.get(API_FILE_URL)
                  if response.status_code == 200:
                      return [k.strip() for k in response.text.splitlines() if len(k.strip()) > 10]
              except:
                  return []

          def is_english_username(username):
              try:
                  username.encode('ascii')
                  return True
              except UnicodeEncodeError:
                  return False

          def get_gpt_reply(comment, username):
              try:
                  clean_name = username.replace('@', '').strip()
                  prompt = f"You are a young, highly entertaining live streamer. Reply to '{comment}' casually in English, max 20 words, mention '{clean_name}' if English. Use human fillers."
                  encoded_prompt = urllib.parse.quote(prompt)
                  url = f"https://text.pollinations.ai/{encoded_prompt}"
                  response = requests.get(url)
                  if response.status_code == 200: return response.text.strip()
              except: pass
              return "Appreciate the comment, bro!" 

          def generate_audio_official(text, api_keys, filename):
              for key in api_keys:
                  try:
                      client = ElevenLabs(api_key=key)
                      audio_generator = client.text_to_speech.convert(text=text, voice_id=VOICE_ID, model_id="eleven_multilingual_v2", output_format="mp3_44100_128")
                      with open(filename, "wb") as f:
                          for chunk in audio_generator:
                              if chunk: f.write(chunk)
                      return True, ""
                  except: continue
              return False, "Error"

          def make_bad_mic_effect(filename):
              try:
                  audio = AudioSegment.from_mp3(filename)
                  slow_audio = audio._spawn(audio.raw_data, overrides={"frame_rate": int(audio.frame_rate * 0.90)}).set_frame_rate(audio.frame_rate)
                  noise = WhiteNoise().to_audio_segment(duration=len(slow_audio)) - 40
                  mixed = slow_audio.overlay(noise).high_pass_filter(250).low_pass_filter(3500)
                  mixed.export(filename, format="mp3")
              except: pass

          def run_continuous_ai_bot(sink_name):
              os.environ['PULSE_SINK'] = sink_name
              processed_comments = set()
              while True:
                  api_keys = get_remote_api_keys()
                  if not api_keys: time.sleep(30); continue
                  try:
                      response = requests.get(WEB_APP_URL)
                      rows = response.json()
                      if rows:
                          for index, row in enumerate(rows):
                              username, comment = str(row[0]).strip(), str(row[2]).strip()
                              unique_id = f"{username}_{comment}"
                              if unique_id in processed_comments: continue 
                              ai_reply = get_gpt_reply(comment, username)
                              filename = f"reply_{index}.mp3"
                              if generate_audio_official(ai_reply, api_keys, filename)[0]:
                                  make_bad_mic_effect(filename)
                                  subprocess.run(['ffplay', '-nodisp', '-autoexit', '-loglevel', 'quiet', filename])
                                  processed_comments.add(unique_id)
                  except: pass
                  time.sleep(20)

          # ==========================================
          # دالة البث الرئيسية (الحل العبقري)
          # ==========================================
          def start_stream(youtube_key, kick_key, sink_name, control_url, apps_script_url, initial_delay=0, is_first_stream=False):
              width, height = 720, 1280
              os.environ['PULSE_SINK'] = sink_name
              disp = Display(visible=0, size=(width, height), backend='xvfb')
              disp.start()
              subprocess.Popen(['unclutter', '-idle', '0'])

              # إعداد المتصفح
              opts = Options()
              opts.add_argument('--no-sandbox')
              opts.add_argument('--disable-dev-shm-usage')
              opts.add_argument('--autoplay-policy=no-user-gesture-required')
              opts.add_argument('--hide-scrollbars')
              opts.add_argument(f'--window-size={width},{height}')
              driver = webdriver.Chrome(options=opts)

              live_id = ""
              try:
                  # === الحل العبقري: فتح رابط الجدولة داخل السيلينيوم لضمان التفعيل ===
                  print(f"🔗 Opening Publishing Link in Browser: {apps_script_url}")
                  driver.get(f"{apps_script_url}?nocache={int(time.time())}")
                  time.sleep(10) # انتظار الجدولة
                  
                  if is_first_stream:
                      page_source = driver.page_source
                      # استخراج الـ ID باستخدام Regex من محتوى الصفحة
                      match = re.search(r'([a-zA-Z0-9_-]{11})', page_source)
                      if match:
                          live_id = match.group(1)
                          print(f"📡 Captured LIVE_ID via Browser: {live_id}")
                          requests.get(f"{WEB_APP_URL}?LIVE_ID={live_id}", timeout=30)
                      else:
                          print("⚠️ Could not find ID on page, sending raw text...")
                          clean_text = driver.find_element(By.TAG_NAME, 'body').text.strip()
                          requests.get(f"{WEB_APP_URL}?LIVE_ID={clean_text[:20]}", timeout=30)
              except Exception as e:
                  print(f"⚠️ Scheduling Error: {e}")

              # الانتقال لرابط المحتوى
              target_url = get_url_from_file(control_url)
              if target_url:
                  print(f"📺 Navigating to Content: {target_url}")
                  driver.get(target_url)
                  time.sleep(5)

              ffmpeg_proc = None
              bot_process = None
              fan_process = None
              stream_duration = random.randint(6000, 8100)

              if is_first_stream:
                  fan_env = os.environ.copy()
                  fan_env['PULSE_SINK'] = sink_name
                  fan_process = subprocess.Popen(['ffplay', '-f', 'lavfi', '-i', 'anoisesrc=a=0.015:c=brown', '-nodisp', '-loglevel', 'quiet'], env=fan_env)
                  bot_process = Process(target=run_continuous_ai_bot, args=(sink_name,))
                  bot_process.start()

              try:
                  outputs = []
                  if youtube_key: outputs.append(f"[f=flv:onfail=ignore]rtmp://a.rtmp.youtube.com/live2/{youtube_key}")
                  if kick_key: outputs.append(f"[f=flv:onfail=ignore]rtmps://fa723fc1b171.global-contribute.live-video.net/app/{kick_key}")
                  
                  ffmpeg_cmd = [
                      'ffmpeg', '-y', '-f', 'x11grab', '-framerate', '60', '-s', f'{width}x{height}', '-i', f":{disp.display}",
                      '-f', 'pulse', '-i', f"{sink_name}.monitor", '-c:v', 'libx264', '-preset', 'ultrafast', '-b:v', '4000k',
                      '-pix_fmt', 'yuv420p', '-c:a', 'aac', '-b:a', '128k', '-f', 'tee', "|".join(outputs)
                  ]
                  ffmpeg_proc = subprocess.Popen(ffmpeg_cmd)
                  active_wait(driver, stream_duration, control_url)
              finally:
                  if fan_process: fan_process.terminate()
                  if bot_process: bot_process.terminate()
                  if ffmpeg_proc: ffmpeg_proc.kill()
                  driver.quit()
                  disp.stop()
                  if is_first_stream: requests.get(f"{WEB_APP_URL}?LIVE_ID=", timeout=30)
                  print("🛑 Stream ended.")

          if __name__ == "__main__":
              session_start = time.time()
              R1, R2, KICK_KEY = os.environ.get('R1'), os.environ.get('R2'), os.environ.get('KICK_KEY')
              if R1 or KICK_KEY:
                  start_stream(R1, KICK_KEY, "Sink1", URL1_CONTROL, APPS_SCRIPT_URL1, 0, is_first_stream=True)
              if R2:
                  time.sleep(random.randint(600, 1200))
                  start_stream(R2, None, "Sink1", URL2_CONTROL, APPS_SCRIPT_URL2, 0, is_first_stream=False)
              
              remaining = TOTAL_SESSION_TIME - (time.time() - session_start)
              if remaining > 0: time.sleep(remaining)
          EOF

      - name: Run Streaming Script
        env:
          R1: ${{ secrets.R1 }}
          R2: ${{ secrets.R2 }}
          KICK_KEY: ${{ secrets.KICK_KEY }}
        run: python main.py

      - name: Wait & Restart
        if: always()
        run: |
          sleep 60
          curl -X POST -H "Authorization: token ${{ github.token }}" -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches -d '{"event_type": "restart-session"}'
