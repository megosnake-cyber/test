    // ==========================================
    // ==========================================
// 1. دالة المسار الآمن (نسخة التوسيع الذكي للخرائط الفردية)
// ==========================================
function generateSafePath(startX, startY) {
    nextStepMap = {};
    
    // 1. تحديد المنطقة الزوجية الآمنة (القلب)
    // في حالة 17x15 ستكون المنطقة الآمنة 16x14
    const safeW = gridW - (gridW % 2); 
    const safeH = gridH - (gridH % 2); 
    
    const mazeCols = safeW / 2;
    const mazeRows = safeH / 2;
    const maze = [];
    
    // إعداد الشبكة الأساسية
    for (let y = 0; y < mazeRows; y++) {
        const row = [];
        for (let x = 0; x < mazeCols; x++) {
            row.push({ visited: false, walls: { top: true, right: true, bottom: true, left: true } });
        }
        maze.push(row);
    }

    // خوارزمية بناء المتاهة (Recursive Backtracker)
    let current = {
        x: Math.floor(Math.min(startX, safeW - 1) / 2),
        y: Math.floor(Math.min(startY, safeH - 1) / 2)
    };
    maze[current.y][current.x].visited = true;
    const stack = [current];

    while (stack.length > 0) {
        const cx = current.x;
        const cy = current.y;
        const neighbors = [];
        if (cy > 0 && !maze[cy - 1][cx].visited) neighbors.push('top');
        if (cx < mazeCols - 1 && !maze[cy][cx + 1].visited) neighbors.push('right');
        if (cy < mazeRows - 1 && !maze[cy + 1][cx].visited) neighbors.push('bottom');
        if (cx > 0 && !maze[cy][cx - 1].visited) neighbors.push('left');

        if (neighbors.length > 0) {
            const dir = neighbors[Math.floor(Math.random() * neighbors.length)];
            let nx = cx, ny = cy;
            if (dir === 'top') { maze[cy][cx].walls.top = false; maze[cy - 1][cx].walls.bottom = false; ny = cy - 1; }
            else if (dir === 'right') { maze[cy][cx].walls.right = false; maze[cy][cx + 1].walls.left = false; nx = cx + 1; }
            else if (dir === 'bottom') { maze[cy][cx].walls.bottom = false; maze[cy + 1][cx].walls.top = false; ny = cy + 1; }
            else if (dir === 'left') { maze[cy][cx].walls.left = false; maze[cy][cx - 1].walls.right = false; nx = cx - 1; }
            maze[ny][nx].visited = true;
            stack.push(current);
            current = { x: nx, y: ny };
        } else {
            current = stack.pop();
        }
    }

    // تحويل المتاهة إلى مسار حركة (Cycle)
    for (let y = 0; y < mazeRows; y++) {
        for (let x = 0; x < mazeCols; x++) {
            const cell = maze[y][x];
            const bx = x * 2;
            const by = y * 2;
            // منطق التحويل من جدران إلى مسار
            if (cell.walls.top) nextStepMap[`${bx},${by}`] = {x: bx + 1, y: by};
            else nextStepMap[`${bx},${by}`] = {x: bx, y: by - 1};
            
            if (cell.walls.right) nextStepMap[`${bx+1},${by}`] = {x: bx + 1, y: by + 1};
            else nextStepMap[`${bx+1},${by}`] = {x: bx + 2, y: by};
            
            if (cell.walls.bottom) nextStepMap[`${bx+1},${by+1}`] = {x: bx, y: by + 1};
            else nextStepMap[`${bx+1},${by+1}`] = {x: bx + 1, y: by + 2};
            
            if (cell.walls.left) nextStepMap[`${bx},${by+1}`] = {x: bx, y: by};
            else nextStepMap[`${bx},${by+1}`] = {x: bx - 1, y: by + 1};
        }
    }

    // ==========================================================
    // المرحلة السحرية: توسيع المسار ليشمل الأطراف الفردية
    // ==========================================================

    // 1. هل العرض فردي (مثلاً 17)؟ نحتاج دمج العمود الأخير
    if (gridW % 2 !== 0) {
        const lastEvenCol = safeW - 1; // العمود 15
        const oddCol = safeW;          // العمود 16 (وهو السابع عشر)
        
        // نمسح العمود قبل الأخير بحثاً عن وصلات نكسرها ونمررها للعمود الجديد
        for (let y = 0; y < safeH; y++) {
            const key = `${lastEvenCol},${y}`;
            const move = nextStepMap[key];
            
            // إذا كانت الحركة رأسية (فوق أو تحت) وعلى نفس العمود
            // نقوم بقطعها وتمريرها عبر العمود الجديد
            if (move && move.x === lastEvenCol) {
                const targetY = move.y;
                
                // التعديل: بدل الذهاب مباشرة للهدف الرأسي..
                // 1. اذهب يمين للعمود الجديد
                nextStepMap[key] = {x: oddCol, y: y};
                // 2. تحرك رأسياً في العمود الجديد
                nextStepMap[`${oddCol},${y}`] = {x: oddCol, y: targetY};
                // 3. عد يساراً للعمود الأصلي
                nextStepMap[`${oddCol},${targetY}`] = {x: lastEvenCol, y: targetY};
            }
        }
    }

    // 2. هل الطول فردي (مثلاً 15)؟ نحتاج دمج الصف الأخير
    if (gridH % 2 !== 0) {
        // نستخدم العرض الكامل (سواء كان 16 أو 17 بعد التوسيع السابق)
        const currentWidth = gridW; 
        const lastEvenRow = safeH - 1; // الصف 13
        const oddRow = safeH;          // الصف 14 (وهو الخامس عشر)

        for (let x = 0; x < currentWidth; x++) {
            const key = `${x},${lastEvenRow}`;
            const move = nextStepMap[key];

            // نبحث عن الحركات الأفقية (يمين أو يسار) في الصف قبل الأخير
            if (move && move.y === lastEvenRow) {
                const targetX = move.x;

                // التعديل: بدل الذهاب مباشرة للهدف الأفقي..
                // 1. انزل تحت للصف الجديد
                nextStepMap[key] = {x: x, y: oddRow};
                // 2. تحرك أفقياً في الصف الجديد
                nextStepMap[`${x},${oddRow}`] = {x: targetX, y: oddRow};
                // 3. اصعد فوق للصف الأصلي
                nextStepMap[`${targetX},${oddRow}`] = {x: targetX, y: lastEvenRow};
            }
        }
    }
}

    // ==========================================
    // 2. دالة الزجزاج (صفوف وأعمدة) - احتفظ بها
// ==========================================
function generateZigzagPath() {
    nextStepMap = {};
    
    // اختيار رقم عشوائي من 0 إلى 3 لتحديد النمط
    // 0: صفوف (عودة يسار) | 1: صفوف (عودة يمين)
    // 2: أعمدة (عودة علوية) | 3: أعمدة (عودة سفلية)
    const mode = Math.floor(Math.random() * 4);
    
    console.log("Strategic Pattern Mode:", mode);

    for (let x = 0; x < gridW; x++) {
        for (let y = 0; y < gridH; y++) {
            let nextX, nextY;

            if (mode === 0) {
                // =================================================
                // النمط 0: أفقي كلاسيكي (مسار العودة هو العمود الأيسر 0)
                // =================================================
                if (x === 0) { 
                    if (y === 0) { nextX = 1; nextY = 0; } // قمة العمود: ادخل يمين
                    else { nextX = 0; nextY = y - 1; }     // اصعد للأعلى
                } else {
                    if (y % 2 === 0) { // صف زوجي: يمين
                        if (x < gridW - 1) { nextX = x + 1; nextY = y; }
                        else { nextX = x; nextY = y + 1; }
                    } else { // صف فردي: يسار
                        if (x > 1) { nextX = x - 1; nextY = y; }
                        else { 
                             if (y < gridH - 1) { nextX = x; nextY = y + 1; } // انزل
                             else { nextX = 0; nextY = y; } // عد للعمود 0
                        }
                    }
                }
            } 
            else if (mode === 1) {
                // =================================================
                // النمط 1: أفقي معكوس (مسار العودة هو العمود الأيمن الأخير)
                // =================================================
                if (x === gridW - 1) { 
                    if (y === 0) { nextX = x - 1; nextY = 0; } // قمة العمود: ادخل يسار
                    else { nextX = x; nextY = y - 1; }         // اصعد للأعلى
                } else {
                    if (y % 2 === 0) { // صف زوجي: يسار
                        if (x > 0) { nextX = x - 1; nextY = y; }
                        else { nextX = x; nextY = y + 1; }
                    } else { // صف فردي: يمين
                        if (x < gridW - 2) { nextX = x + 1; nextY = y; }
                        else { 
                             if (y < gridH - 1) { nextX = x; nextY = y + 1; } // انزل
                             else { nextX = gridW - 1; nextY = y; } // عد للعمود الأخير
                        }
                    }
                }
            } 
            else if (mode === 2) {
                // =================================================
                // النمط 2: عمودي كلاسيكي (مسار العودة هو الصف العلوي 0)
                // =================================================
                if (y === 0) {
                    if (x === 0) { nextX = 0; nextY = 1; } // بداية الصف: انزل
                    else { nextX = x - 1; nextY = 0; }     // تحرك يساراً للعودة
                } else {
                    if (x % 2 === 0) { // عمود زوجي: انزل
                        if (y < gridH - 1) { nextX = x; nextY = y + 1; }
                        else { nextX = x + 1; nextY = y; }
                    } else { // عمود فردي: اصعد
                        if (y > 1) { nextX = x; nextY = y - 1; }
                        else { 
                            if (x < gridW - 1) { nextX = x + 1; nextY = y; } // انتقل لليمين
                            else { nextX = x; nextY = 0; } // اقفل المسار مع الصف 0
                        }
                    }
                }
            } 
            else {
                // =================================================
                // النمط 3: عمودي سفلي (مسار العودة هو الصف السفلي الأخير)
                // =================================================
                if (y === gridH - 1) {
                    if (x === 0) { nextX = 0; nextY = y - 1; } // بداية الصف: اصعد
                    else { nextX = x - 1; nextY = y; }         // تحرك يساراً للعودة
                } else {
                    if (x % 2 === 0) { // عمود زوجي: اصعد
                        if (y > 0) { nextX = x; nextY = y - 1; }
                        else { nextX = x + 1; nextY = y; }
                    } else { // عمود فردي: انزل
                        if (y < gridH - 2) { nextX = x; nextY = y + 1; }
                        else { 
                            if (x < gridW - 1) { nextX = x + 1; nextY = y; } // انتقل لليمين
                            else { nextX = x; nextY = gridH - 1; } // اقفل مع الصف الأخير
                        }
                    }
                }
            }

            // تخزين الخطوة التالية في الخريطة
            nextStepMap[`${x},${y}`] = { x: nextX, y: nextY };
        }
    }
}

    // ==========================================
    // 3. دالة resetGame (معدلة لتختار بين الدالتين السابقتين)
    // ==========================================
    function resetGame() {
    snake = [ {x: 3, y: 7}, {x: 2, y: 7}, {x: 1, y: 7} ]; 
    direction = {x: 1, y: 0};
    score = 0;
    scoreElement.innerText = "0";
    isWinState = false;
    aboutToEat = false;
    particles = [];
    ghostTail = null;

    spawnCookies(); // توليد تفاحات افتراضية فورًا

    // اختيار الاستراتيجية
    if (Math.random() < 0.5) {
        strategyAfter20 = 'zigzag';
        generateZigzagPath();
    } else {
        strategyAfter20 = 'safe';
        generateSafePath(snake[0].x, snake[0].y);
    }

    gameActive = true;
    isFrozen = true; 
    const randomDelay = Math.floor(Math.random() * 3001) + 2000; 
    setTimeout(() => { isFrozen = false; }, randomDelay);
}

   

    function drawGrid() {
        for (let row = 0; row < gridH; row++) {
            for (let col = 0; col < gridW; col++) {
                ctx.fillStyle = (row + col) % 2 === 0 ? '#aad751' : '#a2d149';
                ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
            }
        }
    }

    function triggerConfetti() {
        for(let i=0; i<150; i++) {
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                life: 1.0,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`
            });
        }
    }

    function drawConfetti() {
        particles.forEach((p, index) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2; 
            p.life -= 0.01;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
            if(p.life <= 0) particles.splice(index, 1);
        });
    }

    function isSafe(x, y) {
        return x >= 0 && x < gridW && y >= 0 && y < gridH &&
                !snake.some(b => b.x === x && b.y === y);
    }

    function findPathBFS(start, target) {
        let queue = [start];
        let cameFrom = {}; 
        let visited = {};
        visited[`${start.x},${start.y}`] = true;
        const k = (p) => `${p.x},${p.y}`;

        while (queue.length > 0) {
            let current = queue.shift();
            if (current.x === target.x && current.y === target.y) {
                let path = [];
                let temp = current;
                while (k(temp) !== k(start)) {
                    path.push(temp);
                    temp = cameFrom[k(temp)];
                }
                return path.reverse();
            }
            const moves = [{x:0, y:-1}, {x:0, y:1}, {x:-1, y:0}, {x:1, y:0}];
            for (let m of moves) {
                let neighbor = {x: current.x + m.x, y: current.y + m.y};
                let key = k(neighbor);
                if (isSafe(neighbor.x, neighbor.y) && !visited[key]) {
                    visited[key] = true;
                    cameFrom[key] = current;
                    queue.push(neighbor);
                }
            }
        }
        return null;
    }

   function aiControl() {
        const head = snake[0];
        const totalCells = gridW * gridH;
        const snakePercent = snake.length / totalCells;
        
        let shortcutChance = 0;

        // === منطق التحكم ===
        if (snakePercent < 0.10) {
            // المرحلة الأولى (< 20%): البحث عن التفاح (هجوم)
            // نسمح بالاختصار 100% بغض النظر عن الخريطة المرسومة حالياً
            shortcutChance = 1.0; 
        } else {
            // المرحلة الثانية (> 20%): الالتزام بالخريطة
            // الخريطة تم بناؤها بالفعل في resetGame (سواء كانت زجزاج أو مسارك الآمن)
            // الآن نلتزم بها بنسبة 100% (صفر اختصارات) لضمان النجاة
            shortcutChance = 0.02;
        }

        // 1. الخطوة الافتراضية (من الخريطة التي بنيناها في resetGame)
        const geometricStep = nextStepMap[`${head.x},${head.y}`];
        
        // حماية
        let geoMove = geometricStep ? 
            {x: geometricStep.x - head.x, y: geometricStep.y - head.y} : 
            {x: direction.x, y: direction.y};

        let nextX = 0;
        let nextY = 0;
        let moveDecided = false;

        // 2. محاولة الاختصار (تعمل فقط تحت الـ 20%)
        if (Math.random() < shortcutChance && cookies.length > 0) {
            let target = cookies[0];
            let path = findPathBFS(head, target);
            if (path && path.length > 0) {
                let potentialX = path[0].x - head.x;
                let potentialY = path[0].y - head.y;
                if (isSafe(head.x + potentialX, head.y + potentialY)) {
                    nextX = potentialX;
                    nextY = potentialY;
                    moveDecided = true;
                }
            }
        }

        // 3. التنفيذ (إذا لم نختصر، نتبع الخريطة المرسومة)
        if (!moveDecided) {
            nextX = geoMove.x;
            nextY = geoMove.y;
        }

        // 4. حماية نهائية
        if (!isSafe(head.x + nextX, head.y + nextY)) {
            if (isSafe(head.x + geoMove.x, head.y + geoMove.y)) {
                nextX = geoMove.x;
                nextY = geoMove.y;
            } else {
                const moves = [{x:0, y:-1}, {x:0, y:1}, {x:-1, y:0}, {x:1, y:0}];
                for (let m of moves) {
                    if (isSafe(head.x + m.x, head.y + m.y)) {
                        nextX = m.x; nextY = m.y; break;
                    }
                }
            }
        }

        // تحديث الاتجاه
        let oldDir = direction;
        if (nextX !== oldDir.x || nextY !== oldDir.y) {
            if (nextY === -1) {
                playSound('up');
                playSound('up2'); // تشغيل الصوت الثاني للصعود
            } 
            else if (nextY === 1) {
                playSound('down');
                playSound('down2'); // تشغيل الصوت الثاني للنزول
            } 
            else if (nextX === -1) {
                playSound('left');
                playSound('left2'); // تشغيل الصوت الثاني لليسار
            } 
            else if (nextX === 1) {
                playSound('right');
                playSound('right2'); // تشغيل الصوت الثاني لليمين
            }
        }
        
        direction = {x: nextX, y: nextY};
        const checkNextX = snake[0].x + direction.x;
        const checkNextY = snake[0].y + direction.y;
        aboutToEat = cookies.some(c => c.x === checkNextX && c.y === checkNextY);
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

  
  
    // ==========================================
    // 3. الرسم (تعديل لرسم الدوائر بالصور)
    // ==========================================
   function draw(p = 0) {
        drawGrid();
        pulseScale = 0.95 + 0.1 * (Math.sin(Date.now() * 0.01) / 2 + 0.5);

        // رسم الكوكيز (كما هي)
        cookies.forEach(c => {
            const imgToDraw = (c.img && c.img.complete) ? c.img : images['cookie'];
            const isBackupCookie = (imgToDraw === images['cookie']);
            if (imgToDraw) {
                const size = cellSize * pulseScale;
                const offset = (cellSize - size) / 2;
                const centerX = c.x * cellSize + offset + size / 2;
                const centerY = c.y * cellSize + offset + size / 2;
                const radius = size / 2;
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.save();
                ctx.clip(); 
                let drawSize = size;
                let drawX = c.x * cellSize + offset;
                let drawY = c.y * cellSize + offset;
                if (isBackupCookie) {
                      drawSize = size * 0.80; 
                      const adjust = (size - drawSize) / 2;
                      drawX += adjust;
                      drawY += adjust;
                }
                ctx.drawImage(imgToDraw, drawX, drawY, drawSize, drawSize);
                ctx.restore(); 
                
            }
        });

        // ============================================================
        // 2. الرسم الدقيق للجسم (مع الذيل الشبحي)
        // ============================================================
        
        // ... (داخل دالة draw بعد رسم الكوكيز) ...

        // ============================================================
        // 2. الرسم الدقيق للجسم (بدون وهج وبدون اهتزاز)
        // ============================================================
        
        let renderList = [...snake];
        if (ghostTail) renderList.push(ghostTail);

        // حساب الإحداثيات
        renderList.forEach(block => {
            const startX = (block.oldX !== undefined) ? block.oldX : block.x;
            const startY = (block.oldY !== undefined) ? block.oldY : block.y;
            // تقريب القيم لأقرب جزء من المئة لمنع كسور البكسلات المشوهة
            block.renderX = (startX + (block.x - startX) * p) * cellSize;
            block.renderY = (startY + (block.y - startY) * p) * cellSize;
        });

        if (images['xxax001'].complete && renderList.length > 1) {
            const bodyImg = images['xxax001'];

            // === التعديل الذهبي: الحساب بناءً على الشبكة الثابتة ===
            // بدلاً من حساب المسافات بالبكسل (التي تتغير وتسبب اهتزاز)، نستخدم العدد الثابت
            // كل قطعة تساوي 1 وحدة. الطول الكلي = عدد القطع - 1
            const totalUnits = renderList.length - 1;
            
            // ارتفاع القطعة الواحدة في الصورة المصدر
            const segmentSrcHeight = bodyImg.height / totalUnits;

            for (let i = 1; i < renderList.length; i++) {
                const block = renderList[i];
                const prevBlock = renderList[i - 1];

                const dx = prevBlock.renderX - block.renderX;
                const dy = prevBlock.renderY - block.renderY;
                
                // حساب الزاوية
                const angle = Math.atan2(dy, dx) + Math.PI / 2;

                // === حساب القص من الصورة بدقة متناهية ===
                // القطعة رقم 1 تأخذ الجزء الأول، رقم 2 تأخذ الثاني.. وهكذا
                // i-1 لأننا نبدأ الـ loop من 1
                const sourceY = (i - 1) * segmentSrcHeight;
                let sourceH = segmentSrcHeight;

                // منع الخروج عن حدود الصورة في آخر قطعة بسبب كسور القسمة
                if (sourceY + sourceH > bodyImg.height) {
                    sourceH = bodyImg.height - sourceY;
                }

                ctx.save();
                ctx.translate(block.renderX + cellSize / 2, block.renderY + cellSize / 2);
                ctx.rotate(angle);

                // الرسم:
                // التداخل (Overlap) أصبح 0.2 فقط لإغلاق الفجوة دون صنع وهج
                ctx.drawImage(
                    bodyImg,
                    0, sourceY, bodyImg.width, sourceH,
                    -cellSize / 2, -cellSize / 2, cellSize, cellSize + 0.2
                );

                ctx.restore();
            }
        }

        // ============================================================
        // ============================================================
        // 3. رسم الرأس
        // ============================================================
        let headState = "normal";
        if (!gameActive && !isWinState) headState = "dead";
        else if (aboutToEat && snake.length < (gridW * gridH) - 1) headState = "eat";

        const head = snake[0];
        
        // === التعديل هنا: تثبيت الرأس عند الفوز ===
        let x, y;
        
        if (isWinState) {
            // عند الفوز: نستخدم الموقع الحقيقي الثابت (بدون interpolation)
            // هذا سيمنع الاهتزاز تماماً
            x = head.x * cellSize;
            y = head.y * cellSize;
        } else {
            // أثناء اللعب: نستخدم الموقع الناعم
            x = head.renderX;
            y = head.renderY;
        }
        // ==========================================
        
        // باقي الكود كما هو...
        let angle = 0;
        if (direction.x === 1) angle = Math.PI / 2;      
        else if (direction.x === -1) angle = -Math.PI / 2; 
        else if (direction.y === 1) angle = Math.PI;     
        else angle = 0;                                

        const headImage = images['head_normal'];
        const overlay = images['head_' + headState];
        const now = Date.now();
        const frame = Math.floor((now / 150) % HEAD_FRAMES);

        if (headImage && headImage.complete) {
            const fw = headImage.width / HEAD_FRAMES;
            ctx.save();
            ctx.translate(x + cellSize / 2, y + cellSize / 2);
            ctx.rotate(angle);
            ctx.drawImage(headImage, frame * fw, 0, fw, headImage.height, -cellSize / 2, -cellSize / 2, cellSize, cellSize);
            ctx.restore();
        }

        // رسم تأثير الأكل أو الموت (الفم/اللسان)
        if (headState !== "normal" && overlay && overlay.complete) {
            const fw2 = overlay.width / HEAD_FRAMES;
            
            // === التعديل هنا ===
            // غيرنا الرقم من 0.1 إلى 0.6 لدفعه للأمام
            // كلما زاد الرقم، ابتعد الفم عن الرأس أكثر
            const mouthX = x + direction.x * cellSize * 0.6;
            const mouthY = y + direction.y * cellSize * 0.6;
            
            ctx.save();
            ctx.translate(mouthX + cellSize / 2, mouthY + cellSize / 2);
            ctx.rotate(angle);
            ctx.drawImage(overlay, frame * fw2, 0, fw2, overlay.height, -cellSize / 2, -cellSize / 2, cellSize, cellSize);
            ctx.restore();
        }

        if (particles.length > 0) drawConfetti();
        
        if (isFrozen) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.0)";
            ctx.fillRect(0, canvas.height / 2 - 40, canvas.width, 80);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 40px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("", canvas.width / 2, canvas.height / 2);
        }
    }
    function update(timestamp) {
        if (!lastTime) lastTime = timestamp;
        let delta = timestamp - lastTime;
        lastTime = timestamp;

        // تحديث أنيميشن الرأس
        headAnim.timer += delta;
        if (headAnim.timer > headAnim.speed) {
            headAnim.frame = (headAnim.frame + 1) % HEAD_FRAMES;
            headAnim.timer = 0;
        }

        if (!isFrozen) {
            moveTimer += delta;
            while (moveTimer >= moveInterval) {
                if (gameActive) {
                    aiControl(); 
                    move();
                }
                moveTimer -= moveInterval;
            }
        }

       // إذا انتهت اللعبة (موت)، نثبت الحركة عند 1 لمنع الاهتزاز
let progress = (gameActive) ? (moveTimer / moveInterval) : 1;
        
        // === الحل هنا ===
        // جعلنا الرسم يعمل دائماً لتستمر حركة العيون والكونفيتي أثناء الانتظار
        draw(progress); 
        
        requestAnimationFrame(update);
    }

   function move() {
    // حفظ الأماكن القديمة (للحركة الناعمة)
    snake.forEach(part => {
        part.oldX = part.x;
        part.oldY = part.y;
    });

    // 1. حساب المربع القادم (الرأس المستقبلي)
    const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
    
    // 2. التحقق من التصادم (الحائط أو الجسم)
    if (head.x < 0 || head.x >= gridW || head.y < 0 || head.y >= gridH || 
        snake.some(b => b.x === head.x && b.y === head.y)) {
        if (!isWinState) {
            playSound('lose');
            if (score > highScore) { highScore = score; highScoreElement.innerText = highScore; }
            gameActive = false;
            
            // التصحيح: نحذف onMatchEnd من هنا ونجعل العداد يستدعيها بدلاً من resetGame
            setTimeout(() => { onMatchEnd(); }, 9000);
        }
        return;
    }

    // 3. التحقق هل المربع القادم يحتوي على تفاحة؟ (قبل التحرك)
    let potentialAteIndex = -1;
    cookies.forEach((c, i) => {
        if (head.x === c.x && head.y === c.y) potentialAteIndex = i;
    });

    // === التعديل الجذري هنا ===
    // إذا كان طول الثعبان هو (الحد الأقصى - 1) والمربع القادم فيه تفاحة
    // إذن هذا هو الفوز! نعلن الفوز فوراً دون أن نتحرك خطوة للأمام
    if (snake.length === (gridW * gridH) - 1 && potentialAteIndex !== -1) {
        
        // 1. زيادة السكور يدوياً (لأننا لن نأكلها فعلياً)
        score++;
        scoreElement.innerText = score;
        
        // 2. نحتفظ ببيانات الفائز
        const lastUserEaten = cookies[potentialAteIndex];

        // 3. نعلن الفوز (بدون تحريك الثعبان وبدون حذف التفاحة)
        winGame(lastUserEaten);
        
        return; // توقف هنا! لا تنفذ باقي الكود
    }

    // 4. تنفيذ الحركة (إذا لم نفز بعد)
    snake.unshift(head);
    
    // ضبط خروج الرأس بسلاسة
    if (snake[1]) {
        snake[0].oldX = snake[1].x;
        snake[0].oldY = snake[1].y;
    } else {
         snake[0].oldX = head.x - direction.x;
         snake[0].oldY = head.y - direction.y;
    }

    ghostTail = null;

    // 5. التعامل مع الأكل (في الحالات العادية غير الأخيرة)
    if (potentialAteIndex !== -1) {
        score++;
        scoreElement.innerText = score;
        playSound('eat');
        
        // هنا لا داعي للتحقق من الفوز لأننا تحققنا منه في الأعلى
        // ... داخل دالة move ...
        // الجزء الخاص بتوليد قطعة جديدة بعد الأكل
        
        let newCookie; 
        let attempts = 0;
        do {
            const randomUser = usersData[Math.floor(Math.random() * usersData.length)];
            newCookie = { 
                x: Math.floor(Math.random() * gridW), 
                y: Math.floor(Math.random() * gridH), 
                img: images['cookie.png'],  // التفاحة الأساسية
                name: ""                  // بدون أسماء
            };
            attempts++;
        } while (
            (snake.some(s => s.x === newCookie.x && s.y === newCookie.y) || 
            cookies.some(c => c.x === newCookie.x && c.y === newCookie.y)) && 
            
            // === التعديل هنا ===
            // غيرنا الرقم من 100 إلى 5000
            // هذا يعطي الكمبيوتر وقتاً أطول للبحث عن مكان فارغ بدقة وسط الزحام
            attempts < 5000
        );
        cookies[potentialAteIndex] = newCookie;

    } else {
        // حذف الذيل (الحركة العادية)
        const popped = snake.pop();
        ghostTail = popped;
        const newTail = snake[snake.length - 1];
        ghostTail.oldX = popped.x; 
        ghostTail.oldY = popped.y;
        ghostTail.x = newTail.oldX;
        ghostTail.y = newTail.oldY;
    }
}

    function winGame(winnerUser) {
        gameActive = false; 
        isWinState = true;
        playSound('win');
        
        // تم حذف onMatchEnd(); من هنا
        
        triggerConfetti();
        
        if (score > highScore) {
            highScore = score;
            highScoreElement.innerText = highScore;
        }

        // تسجيل الفائز في القائمة
        if (winnerUser) {
            registerWin(winnerUser);
        }

        // التصحيح: العداد يستدعي onMatchEnd لتبدأ الدورة الجديدة بشكل صحيح
        setTimeout(() => { onMatchEnd(); }, 9000);
    }

  
  
    function startGame() {
        resizeGame();
        resetGame();
        requestAnimationFrame(update);
    }
// ... (بعد نهاية كل الدوال) ...

    // استدعاء أولي لضبط حجم الخريطة فوراً حتى لا تتغير عند التحميل
    resizeGame();

    // استدعاء أولي لعرض القائمة فور فتح الصفحة (حتى لو لم تبدأ اللعبة)
    updateLeaderboardUI(); 

    // تشغيل الأنيميشن (Loop)
    requestAnimationFrame(update);
</script>
  
  
</body>
</html>
