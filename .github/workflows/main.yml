name: Perpetual Single Stream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-session]

# تم إزالة قسم concurrency عمداً للسماح للجلسة الجديدة بالبدء والتحضير 
# قبل أن تنتهي الجلسة الحالية، مما يضمن عدم انقطاع البث على يوتيوب.

env:
  ENABLE_STREAM: 1

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: System Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg pulseaudio google-chrome-stable unclutter > /dev/null
          pulseaudio -D --exit-idle-time=-1 --disallow-exit || true
          pactl load-module module-null-sink sink_name=Sink1

      - name: Python Setup
        run: pip install selenium pyvirtualdisplay requests

      - name: Create Python Script
        run: |
          cat << 'EOF' > main.py
          import os, subprocess, time, requests, signal, sys
          from pyvirtualdisplay import Display
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By

          # ==========================================
          # إعدادات البث والمروحة وروابط التحكم
          # ==========================================
          MASTER_CONTROL_URL = "https://meja.do.am/work/lives.txt"

          TOTAL_SESSION_TIME = 5 * 3600  # 5 ساعات
          OVERLAP_TIME = 90  # بدء الجلسة الجديدة قبل انتهاء الحالية بـ 90 ثانية
          FAN_VOLUME = 0.08 

          def kill_all(signum, frame):
              os._exit(0)

          signal.signal(signal.SIGTERM, kill_all)
          signal.signal(signal.SIGINT, kill_all)

          def get_stream_config():
              try:
                  res = requests.get(f"{MASTER_CONTROL_URL}?t={int(time.time())}", timeout=10)
                  lines = [l.strip() for l in res.text.strip().split('\n') if l.strip()]
                  if len(lines) > 0:
                      parts = lines[0].split()
                      if len(parts) >= 2:
                          return parts[0], parts[1] # إرجاع الرابط وحالة البث (0 أو 1)
              except Exception as e:
                  print(f"Error reading control file: {e}")
              return None, None

          def trigger_new_session():
              print("🚀 Triggering new session to overlap and ensure continuous 24/7 stream...")
              url = f"https://api.github.com/repos/{os.environ['GITHUB_REPO']}/dispatches"
              headers = {
                  "Authorization": f"token {os.environ['GITHUB_TOKEN']}",
                  "Accept": "application/vnd.github.v3+json"
              }
              data = {"event_type": "restart-session"}
              try:
                  requests.post(url, headers=headers, json=data)
                  print("✅ New GitHub Action triggered successfully.")
              except Exception as e:
                  print(f"❌ Error triggering new session: {e}")

          def active_wait(driver, duration):
              start_time = time.time()
              last_check_time = 0
              last_url = driver.current_url
              triggered_next = False
              
              while time.time() - start_time < duration:
                  elapsed = time.time() - start_time
                  
                  # تشغيل الجلسة القادمة قبل إغلاق الحالية بـ 90 ثانية (Overlap)
                  if not triggered_next and elapsed >= (duration - OVERLAP_TIME):
                      trigger_new_session()
                      triggered_next = True
                      
                  try:
                      driver.find_element(By.TAG_NAME, 'body').click()
                  except:
                      pass
                  
                  current_time = time.time()
                  if current_time - last_check_time > 10: 
                      last_check_time = current_time
                      new_url, status = get_stream_config()
                      
                      if status == "0":
                          print("🛑 Control file requested STOP (status=0). Ending stream...")
                          break 
                      
                      if new_url and status == "1" and new_url != last_url:
                          try:
                              driver.delete_all_cookies()
                              driver.execute_script("window.localStorage.clear();")
                              driver.execute_script("window.sessionStorage.clear();")
                              driver.get(new_url)
                              last_url = new_url
                              print(f"🔄 URL updated dynamically to: {new_url}")
                          except Exception:
                              pass
                  
                  time.sleep(5)

          # ==========================================
          # دالة البث الرئيسية 
          # ==========================================
          def start_stream(youtube_key, sink_name):
              os.environ['PULSE_SINK'] = sink_name
              
              # الشاشة الخاصة باللعبة بمقاس 1280x720 بالعرض
              disp1 = Display(visible=0, size=(1280, 720), backend='xvfb')
              disp1.start()
              
              subprocess.Popen(['unclutter', '-idle', '0', '-display', f":{disp1.display}"])
              
              ffmpeg_proc = None
              fan_process = None
              driver1 = None
              
              print(f"🎯 Target Stream Duration: {TOTAL_SESSION_TIME} seconds ({TOTAL_SESSION_TIME/3600:.2f} hours).")

              try:
                  opts = Options()
                  opts.add_argument('--no-sandbox')
                  opts.add_argument('--disable-dev-shm-usage')
                  opts.add_argument('--autoplay-policy=no-user-gesture-required')
                  opts.add_argument('--disable-notifications')
                  opts.add_argument('--disable-infobars')
                  opts.add_argument('--disable-extensions')
                  opts.add_argument('--disable-popup-blocking')
                  opts.add_argument('--disable-gpu')
                  opts.add_argument('--disable-software-rasterizer')
                  
                  # أمر تصغير محتوى المتصفح بنسبة 80% ليحتوي اللعبة بالكامل
                  opts.add_argument('--force-device-scale-factor=0.8')
                  opts.add_argument('--window-size=1280,720')
                  
                  opts.add_experimental_option("excludeSwitches", ["enable-automation"])
                  opts.add_experimental_option('useAutomationExtension', False)
                  opts.add_argument('--disable-blink-features=AutomationControlled')
                  opts.add_argument('--hide-scrollbars')
                  opts.add_argument('--kiosk')

                  # تشغيل متصفح اللعبة مباشرة دون المرور برابط النشر
                  os.environ['DISPLAY'] = f":{disp1.display}"
                  driver1 = webdriver.Chrome(options=opts)
                  
                  target_url, status = get_stream_config()
                  if target_url:
                      print(f"📺 Navigating directly to Game Content: {target_url}")
                      driver1.get(target_url)
                      time.sleep(8)

                  # تشغيل صوت المروحة
                  fan_cmd = [
                      'ffplay', '-f', 'lavfi', 
                      '-i', f'anoisesrc=a={FAN_VOLUME}:c=pink,lowpass=f=800,tremolo=f=0.04:d=0.6', 
                      '-nodisp', '-loop', '0', '-loglevel', 'quiet'
                  ]
                  fan_env = os.environ.copy()
                  fan_env['PULSE_SINK'] = sink_name
                  fan_process = subprocess.Popen(fan_cmd, env=fan_env)

                  # التسجيل المباشر للشاشة بدقة 1280x720 بالعرض
                  ffmpeg_cmd = [
                      'ffmpeg', '-y',
                      '-nostats', '-loglevel', 'error',
                      '-thread_queue_size', '512',
                      '-f', 'x11grab',
                      '-framerate', '60',
                      '-video_size', '1280x720',
                      '-i', f":{disp1.display}",
                      '-thread_queue_size', '512',
                      '-f', 'pulse',
                      '-i', f"{sink_name}.monitor",
                      '-map', '0:v',
                      '-map', '1:a',
                      '-c:v', 'libx264',
                      '-preset', 'ultrafast',
                      '-tune', 'zerolatency',
                      '-fps_mode', 'cfr',
                      '-b:v', '3000k',
                      '-maxrate', '3000k',
                      '-bufsize', '6000k',
                      '-r', '60',
                      '-g', '120',
                      '-keyint_min', '120',
                      '-sc_threshold', '0',
                      '-pix_fmt', 'yuv420p',
                      '-c:a', 'aac',
                      '-b:a', '128k',
                      '-f', 'flv',
                      f"rtmp://a.rtmp.youtube.com/live2/{youtube_key}"
                  ]

                  print("🎬 Starting FFmpeg Stream...")
                  ffmpeg_proc = subprocess.Popen(ffmpeg_cmd)
                  active_wait(driver1, TOTAL_SESSION_TIME)

              except Exception as e:
                  print(f"Stream encountered an error: {e}")
              finally:
                  if fan_process:
                      fan_process.terminate()
                  if ffmpeg_proc:
                      ffmpeg_proc.kill()
                  try:
                      if driver1: driver1.quit()
                  except:
                      pass
                  disp1.stop()
                  print("🛑 Stream ended successfully.")

          if __name__ == "__main__":
              current_key = os.environ.get('R1')
              
              if current_key:
                  _, init_status = get_stream_config()
                  if init_status == "0":
                      print("⚠️ Stream R1 is set to 0 in control file. Exiting...")
                  else:
                      print("🚀 Starting Continuous Stream Session for R1...")
                      start_stream(current_key, "Sink1")
              else:
                  print("⚠️ Stream key for R1 is missing.")
          EOF

      - name: Run Streaming Script
        env:
          R1: ${{ secrets.R1 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # لإرسال أمر تشغيل الجلسة الجديدة من داخل البايثون
          GITHUB_REPO: ${{ github.repository }}
        run: python main.py
