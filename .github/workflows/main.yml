name: Perpetual Dual Stream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-session]

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: System Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg pulseaudio google-chrome-stable unclutter > /dev/null
          pulseaudio -D --exit-idle-time=-1 --disallow-exit || true
          pactl load-module module-null-sink sink_name=Sink1

      - name: Python Setup
        run: pip install selenium pyvirtualdisplay requests

      - name: Create Python Script
        run: |
          cat << 'EOF' > main.py
          import os, subprocess, time, requests, signal
          from pyvirtualdisplay import Display
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By

          # إعدادات الروابط والتحكم
          URL1_CONTROL = "https://meja.do.am/work/url1.txt"
          APPS_SCRIPT_URL1 = "https://script.google.com/macros/s/AKfycbzdsjYNRkAdtnbk0B15SPO8Zi_SSOovk9gd0z9OG1Fq1PExCwaZ3A6WT6P5jwaSHnCujA/exec"

          def kill_all(signum, frame):
              os._exit(0)

          signal.signal(signal.SIGTERM, kill_all)
          signal.signal(signal.SIGINT, kill_all)

          def get_url_from_file(control_url):
              try:
                  res = requests.get(f"{control_url}?t={int(time.time())}", timeout=5)
                  lines = [l.strip() for l in res.text.strip().split('\n') if l.strip()]
                  for line in lines:
                      parts = line.split()
                      if len(parts) >= 2 and parts[1] == "1":
                          return parts[0]
              except:
                  pass
              return None

          def active_wait(driver, duration, control_url=None):
              start_time = time.time()
              last_url = driver.current_url
              while time.time() - start_time < duration:
                  try:
                      driver.find_element(By.TAG_NAME, 'body').click()
                  except:
                      pass
                  if control_url:
                      new_url = get_url_from_file(control_url)
                      if new_url and new_url != last_url:
                          driver.get(new_url)
                          last_url = new_url
                  time.sleep(5)

          def start_stream(rtmp_key, kick_key, sink_name, control_url, apps_script_url):
              try:
                  print("Triggering Apps Script...")
                  requests.get(apps_script_url, timeout=30, allow_redirects=True)
                  time.sleep(5)
              except:
                  pass

              width, height = 720, 1280
              os.environ['PULSE_SINK'] = sink_name
              disp = Display(visible=0, size=(width, height), backend='xvfb')
              disp.start()
              
              subprocess.Popen(['unclutter', '-idle', '0'])
              
              target_url = get_url_from_file(control_url)
              if not target_url:
                  print("No target URL found.")
                  return

              opts = Options()
              opts.add_argument('--no-sandbox')
              opts.add_argument('--disable-dev-shm-usage')
              opts.add_argument('--autoplay-policy=no-user-gesture-required')
              opts.add_argument('--hide-scrollbars')
              opts.add_argument(f'--app={target_url}')
              
              driver = webdriver.Chrome(options=opts)
              time.sleep(10)

              # بناء أمر FFmpeg للبث المزدوج
              youtube_url = f"rtmp://a.rtmp.youtube.com/live2/{rtmp_key}"
              kick_url = f"rtmps://fa723fc1b171.global-contribute.live-video.net/app/{kick_key}"

              # نستخدم tee muxer مع تحديد f=flv لكل مخرج
              outputs = f"[f=flv]{youtube_url}|[f=flv]{kick_url}"

              ffmpeg_cmd = [
                  'ffmpeg', '-y',
                  '-f', 'x11grab', '-framerate', '60', '-s', f'{width}x{height}', '-i', f":{disp.display}",
                  '-f', 'pulse', '-i', f"{sink_name}.monitor",
                  '-c:v', 'libx264', '-preset', 'ultrafast', '-tune', 'zerolatency', '-b:v', '4000k',
                  '-pix_fmt', 'yuv420p', '-g', '120',
                  '-c:a', 'aac', '-b:a', '128k', '-ar', '44100',
                  '-f', 'tee', '-map', '0:v', '-map', '1:a', outputs
              ]

              ffmpeg_proc = subprocess.Popen(ffmpeg_cmd)
              try:
                  active_wait(driver, 3500, control_url)
              finally:
                  ffmpeg_proc.kill()
                  driver.quit()
                  disp.stop()

          if __name__ == "__main__":
              R1 = os.environ.get('R1')
              KICK = os.environ.get('KICK_KEY')
              if R1 and KICK:
                  start_stream(R1, KICK, "Sink1", URL1_CONTROL, APPS_SCRIPT_URL1)
              else:
                  print("Missing Stream Keys!")
          EOF

      - name: Run Streaming Script
        env:
          R1: ${{ secrets.R1 }}
          KICK_KEY: ${{ secrets.KICK_KEY }}
        run: python main.py

      - name: Wait & Restart
        if: always()
        run: |
          sleep 60
          curl -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart-session"}'
