// دالة تحميل اللاعبين من Google Sheet
async function startRoundWithFetch() {
    const googleSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS-8_oziBhZRvHh6XJVMKaM8Yievfi1edBYAbuZev1H9PdjGxBZ-uQ4kQCoZsxO99EA_kQc2Axm2ix4/pub?output=csv";
    
    let users = [];
    const usedNames = new Set();

    try {
        // تم إزالة رسالة التحميل بناء على طلبك
        // loadingText.innerText = "Start of the match...";

        const response = await fetch(googleSheetUrl + "&t=" + Date.now());
        if (response.ok) {
            const csvText = await response.text();
            const rows = csvText.split(/\r?\n/);

            for (let i = 0; i < rows.length; i++) {
                let row = rows[i];
                if (!row.trim()) continue;

                const cols = row.split(',');
                if (cols.length >= 2) {
                    let name = cols[0].trim().replace(/^"|"$/g, '');
                    let photo = cols[1].trim().replace(/^"|"$/g, '');

                    if (name.includes("timestamp") || name.includes("username")) continue;

                    if (name.startsWith('@') || name.length > 1) {
                        if (photo.startsWith('http:')) photo = photo.replace('http:', 'https:');

                        if (!usedNames.has(name)) {
                            users.push({ name: name, photo: photo });
                            usedNames.add(name);
                        }
                    }
                }
            }
        }
    } catch (err) {
        console.error("خطأ في الاتصال:", err);
        // تم إزالة رسالة الخطأ للمستخدم
        return;
    }

