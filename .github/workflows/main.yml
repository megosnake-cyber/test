name: Perpetual Dual Stream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-session]

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 ساعات للجلسة
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: System Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg pulseaudio google-chrome-stable unclutter > /dev/null
          pulseaudio -D --exit-idle-time=-1 --disallow-exit || true
          pactl load-module module-null-sink sink_name=Sink1

      - name: Python Setup
        run: pip install selenium pyvirtualdisplay requests elevenlabs pydub

      - name: Create Python Script
        run: |
          cat << 'EOF' > main.py
          import os, subprocess, time, requests, signal, random, urllib.parse, re
          from multiprocessing import Process
          from pyvirtualdisplay import Display
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from pydub import AudioSegment
          from pydub.generators import WhiteNoise
          from elevenlabs.client import ElevenLabs

          # ==========================================
          # إعدادات البث
          # ==========================================
          URL1_CONTROL = "https://meja.do.am/work/url1.txt"
          APPS_SCRIPT_URL1 = "https://script.google.com/macros/s/AKfycbxktpGQjfoRpKjszasSI6hs7k8xCQ4gP_1p7-BDlHGorBTolQmQActMDayp4aMPLUJM/exec"
          
          URL2_CONTROL = "https://meja.do.am/work/url2.txt"
          APPS_SCRIPT_URL2 = "https://script.google.com/macros/s/AKfycbwdVaCnCfcwFVnyY1wEOOWQawopiDTDEzfS2wcPMhWAG3VBHNJ-4AAwIKX80NjBWaMJ/exec"

          TOTAL_SESSION_TIME = 5 * 3600 

          # ==========================================
          # إعدادات المعلق الصوتي الذكي والشيت
          # ==========================================
          WEB_APP_URL = "https://script.google.com/macros/s/AKfycby-1VgIowDBtMCaY4IOCriEG8YRIIQqcB9cXvf7KmbkfZEnG4iD1Hg66HieuQ86xFVH8g/exec"
          VOICE_ID = "CwhRBWXzGAHq8TQ4Fs17"

          def kill_all(signum, frame):
              os._exit(0)

          signal.signal(signal.SIGTERM, kill_all)
          signal.signal(signal.SIGINT, kill_all)

          def get_url_from_file(control_url):
              try:
                  res = requests.get(f"{control_url}?t={int(time.time())}", timeout=5)
                  lines = [l.strip() for l in res.text.strip().split('\n') if l.strip()]
                  for line in lines:
                      parts = line.split()
                      if len(parts) >= 2 and parts[1] == "1":
                          return parts[0]
              except:
                  pass
              return None

          def active_wait(driver, duration, control_url=None):
              start_time = time.time()
              last_url = driver.current_url
              while time.time() - start_time < duration:
                  try:
                      driver.find_element(By.TAG_NAME, 'body').click()
                  except:
                      pass
                  if control_url:
                      new_url = get_url_from_file(control_url)
                      if new_url and new_url != last_url:
                          driver.delete_all_cookies()
                          driver.execute_script("window.localStorage.clear();")
                          driver.execute_script("window.sessionStorage.clear();")
                          driver.get(new_url)
                          last_url = new_url
                  time.sleep(3)

          # ==========================================
          # دوال المعلق الصوتي (AI Bot)
          # ==========================================
          def get_remote_api_keys():
              API_FILE_URL = "https://meja.do.am/aimp3/api.txt"
              try:
                  response = requests.get(API_FILE_URL)
                  if response.status_code == 200:
                      return [k.strip() for k in response.text.splitlines() if len(k.strip()) > 10]
              except:
                  return []

          def get_gpt_reply(comment, username):
              try:
                  prompt = f"Streamer reply to {username}: {comment}. Short, cool, max 15 words, American slang, no emojis."
                  encoded_prompt = urllib.parse.quote(prompt)
                  url = f"https://text.pollinations.ai/{encoded_prompt}"
                  response = requests.get(url)
                  if response.status_code == 200:
                      return response.text.strip()
              except:
                  pass
              return "Yo, thanks for the comment!"

          def generate_audio_official(text, api_keys, filename):
              for key in api_keys:
                  try:
                      client = ElevenLabs(api_key=key)
                      audio_generator = client.text_to_speech.convert(
                          text=text, voice_id=VOICE_ID, model_id="eleven_multilingual_v2", output_format="mp3_44100_128"
                      )
                      with open(filename, "wb") as f:
                          for chunk in audio_generator:
                              if chunk: f.write(chunk)
                      return True
                  except:
                      continue
              return False

          def run_continuous_ai_bot(sink_name):
              os.environ['PULSE_SINK'] = sink_name
              processed_comments = set()
              while True:
                  api_keys = get_remote_api_keys()
                  if not api_keys:
                      time.sleep(30)
                      continue
                  try:
                      response = requests.get(WEB_APP_URL)
                      rows = response.json() if isinstance(response.json(), list) else response.json().get('data', [])
                      if rows:
                          for row in rows:
                              username, comment = str(row[0]), str(row[2])
                              uid = f"{username}_{comment}"
                              if uid not in processed_comments:
                                  reply = get_gpt_reply(comment, username)
                                  fname = "reply.mp3"
                                  if generate_audio_official(reply, api_keys, fname):
                                      subprocess.run(['ffplay', '-nodisp', '-autoexit', '-loglevel', 'quiet', fname])
                                      processed_comments.add(uid)
                  except:
                      pass
                  time.sleep(20)

          # ==========================================
          # دالة البث الرئيسية
          # ==========================================
          def start_stream(youtube_key, kick_key, sink_name, control_url, apps_script_url, initial_delay=0, is_first_stream=False):
              try:
                  print(f"Triggering Apps Script: {apps_script_url}")
                  # إضافة متغير عشوائي لقتل الكاش في جوجل تماماً
                  trigger_url = f"{apps_script_url}?t={int(time.time())}&rand={random.randint(1000,9999)}"
                  
                  # تنفيذ الطلب مثل السكربت القديم
                  res = requests.get(trigger_url, timeout=60, allow_redirects=True)
                  raw_text = res.text.strip()
                  print(f"RAW RESPONSE FROM GOOGLE: {raw_text}")
                  
                  if is_first_stream:
                      # استخراج الـ ID المكون من 11 حرفاً (YouTube ID format)
                      match = re.search(r'([a-zA-Z0-9_-]{11})', raw_text)
                      if match:
                          live_id = match.group(1)
                          print(f"📡 New captured LIVE_ID: {live_id}")
                          requests.get(f"{WEB_APP_URL}?LIVE_ID={live_id}")
                      else:
                          print("⚠️ No valid ID found in response.")
                  
                  time.sleep(10)
              except Exception as e:
                  print(f"Trigger Error: {e}")

              if initial_delay > 0: time.sleep(initial_delay)
              
              width, height = 720, 1280
              os.environ['PULSE_SINK'] = sink_name
              disp = Display(visible=0, size=(width, height), backend='xvfb')
              disp.start()
              subprocess.Popen(['unclutter', '-idle', '0'])
              
              if is_first_stream:
                  Process(target=run_continuous_ai_bot, args=(sink_name,)).start()
                  fan_cmd = ['ffplay', '-f', 'lavfi', '-i', 'anoisesrc=a=0.01:c=brown', '-nodisp', '-loglevel', 'quiet']
                  fan_env = os.environ.copy()
                  fan_env['PULSE_SINK'] = sink_name
                  subprocess.Popen(fan_cmd, env=fan_env)

              try:
                  target_url = get_url_from_file(control_url)
                  if target_url:
                      opts = Options()
                      opts.add_argument('--no-sandbox')
                      opts.add_argument('--disable-dev-shm-usage')
                      opts.add_argument(f'--app={target_url}')
                      driver = webdriver.Chrome(options=opts)
                      
                      outputs = []
                      if youtube_key: outputs.append(f"[f=flv]rtmp://a.rtmp.youtube.com/live2/{youtube_key}")
                      if kick_key: outputs.append(f"[f=flv]rtmps://fa723fc1b171.global-contribute.live-video.net/app/{kick_key}")
                      
                      ffmpeg_cmd = [
                          'ffmpeg', '-y', '-f', 'x11grab', '-framerate', '60', '-s', f'{width}x{height}', '-i', f":{disp.display}",
                          '-f', 'pulse', '-i', f"{sink_name}.monitor", '-c:v', 'libx264', '-preset', 'ultrafast',
                          '-b:v', '4000k', '-c:a', 'aac', '-b:a', '128k', '-f', 'tee', "|".join(outputs)
                      ]
                      ffmpeg_proc = subprocess.Popen(ffmpeg_cmd)
                      active_wait(driver, random.randint(6000, 8000), control_url)
              finally:
                  os.system("pkill -f ffmpeg")
                  os.system("pkill -f chrome")
                  disp.stop()
                  if is_first_stream: requests.get(f"{WEB_APP_URL}?LIVE_ID=")

          if __name__ == "__main__":
              R1, R2, KICK = os.environ.get('R1'), os.environ.get('R2'), os.environ.get('KICK_KEY')
              if R1 or KICK:
                  start_stream(R1, KICK, "Sink1", URL1_CONTROL, APPS_SCRIPT_URL1, 0, True)
              if R2:
                  time.sleep(random.randint(600, 1200))
                  start_stream(R2, None, "Sink1", URL2_CONTROL, APPS_SCRIPT_URL2, 0, False)
          EOF

      - name: Run Streaming Script
        env:
          R1: ${{ secrets.R1 }}
          R2: ${{ secrets.R2 }}
          KICK_KEY: ${{ secrets.KICK_KEY }}
        run: python main.py

      - name: Restart Workflow
        if: always()
        run: |
          sleep 60
          curl -X POST -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart-session"}'
