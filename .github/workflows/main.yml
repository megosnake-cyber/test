name: Perpetual Dual Stream

on:
  workflow_dispatch:

concurrency:
  group: streaming-group
  cancel-in-progress: true

env:
  ENABLE_STREAM: 1

jobs:
  stream:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🔢 Initialize System States
        run: |
          if [ ! -f hashtag.txt ]; then
            echo "32" > hashtag.txt
          fi

      - name: System Setup
        run: |
          echo "1. Fixing Mirror Links..."
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "http://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo sed -i 's/azure.archive.ubuntu.com/archive.ubuntu.com/g' /etc/apt/sources.list || true
          
          echo "2. Updating Repositories..."
          sudo apt-get update -y
          
          echo "3. Installing Packages & KasmVNC (WebRTC)..."
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y --no-install-recommends xvfb ffmpeg pulseaudio unclutter wget expect openbox openssl
          wget -q https://github.com/kasmtech/KasmVNC/releases/download/v1.3.2/kasmvncserver_jammy_1.3.2_amd64.deb
          sudo apt-get install -y ./kasmvncserver_jammy_1.3.2_amd64.deb
          
          echo "4. Setting up Audio..."
          pulseaudio -D --exit-idle-time=-1 --disallow-exit || true
          pactl load-module module-null-sink sink_name=Sink1

      - name: Setup Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared

      - name: Python Setup
        run: pip install -U urllib3 chardet requests selenium pyvirtualdisplay

      - name: Create Python Script
        run: |
          cat << 'EOF' > main.py
          import os, subprocess, time, requests, signal, random, urllib.parse, sys, re
          import warnings
          warnings.filterwarnings("ignore")
          
          from pyvirtualdisplay import Display
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By

          MASTER_CONTROL_URL = "https://meja.do.am/work/lives.txt"
          APPS_SCRIPT_URL = "https://script.google.com/macros/s/1111AKfycbwnZmIhWA2sSE0w1rbLHVfszDK2_deVCJkq6UGZUkuvb486993f7nwxh7Jll66hlqrK/exec"
          TOTAL_SESSION_TIME = random.randint(5 * 3600, 6 * 3600)
          FAN_VOLUME = 0.08 

          def kill_all(signum, frame):
              os._exit(0)

          signal.signal(signal.SIGTERM, kill_all)
          signal.signal(signal.SIGINT, kill_all)

          def get_stream_config(index):
              try:
                  res = requests.get(f"{MASTER_CONTROL_URL}?t={int(time.time())}", timeout=10)
                  lines = [l.strip() for l in res.text.strip().split('\n') if l.strip()]
                  if index - 1 < len(lines):
                      parts = lines[index - 1].split()
                      if len(parts) >= 2:
                          return parts[0], parts[1]
              except Exception as e:
                  pass
              return None, None

          def active_wait(driver, duration, stream_index):
              start_time = time.time()
              last_check_time = 0
              last_url = driver.current_url
              
              while time.time() - start_time < duration:
                  try:
                      driver.find_element(By.TAG_NAME, 'body').click()
                  except:
                      pass
                  
                  current_time = time.time()
                  if current_time - last_check_time > 10:
                      last_check_time = current_time
                      new_url, status = get_stream_config(stream_index)
                      
                      if status == "0":
                          print(f"🛑 Control file requested STOP (status=0). Ending stream...", flush=True)
                          break
                      
                      if new_url and status == "1" and new_url != last_url:
                          try:
                              driver.delete_all_cookies()
                              driver.execute_script("window.localStorage.clear();")
                              driver.execute_script("window.sessionStorage.clear();")
                              driver.execute_cdp_cmd('Network.clearBrowserCache', {})
                              driver.execute_cdp_cmd('Network.clearBrowserCookies', {})
                              driver.get(new_url)
                              last_url = new_url
                              print(f"🔄 URL updated dynamically to: {new_url}", flush=True)
                          except:
                              pass
                  
                  time.sleep(5)

          def start_stream(youtube_key, sink_name, stream_index, apps_script_url, duration, stream_title=None):
              os.environ['PULSE_SINK'] = sink_name
              
              # تشغيل الشاشة الوهمية
              disp1 = Display(visible=0, size=(720, 1280), backend='xvfb')
              disp1.start()
              os.environ['DISPLAY'] = f":{disp1.display}"
              
              # إنشاء المجلدات وحل مشكلة الصلاحيات
              os.system('mkdir -p ~/.vnc ~/.kasmvnc')
              os.system('touch ~/.Xauthority')
              
              # توليد شهادة أمان محلية لحل مشكلة ssl-cert-snakeoil
              os.system('openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout ~/.vnc/kasmvnc.key -out ~/.vnc/kasmvnc.pem -subj "/C=EG/ST=Cairo/L=Cairo/O=Snake/CN=localhost" 2>/dev/null')
              
              # إلغاء رسالة إعداد بيئة سطح المكتب
              os.system('sudo rm -f /usr/lib/kasmvncserver/select-de.sh')
              os.system('sudo bash -c "echo \'#!/bin/sh\' > /usr/lib/kasmvncserver/select-de.sh"')
              os.system('sudo bash -c "echo \'exit 0\' >> /usr/lib/kasmvncserver/select-de.sh"')
              os.system('sudo chmod +x /usr/lib/kasmvncserver/select-de.sh')
              
              # إعداد كلمة المرور صامتاً
              expect_script = """#!/usr/bin/expect -f
          spawn kasmvncpasswd -u kasm_user -w
          expect "Password:"
          send "123456\\r"
          expect "Verify:"
          send "123456\\r"
          expect eof
          """
              with open("setup_vnc.exp", "w") as f:
                  f.write(expect_script)
              os.system("chmod +x setup_vnc.exp && ./setup_vnc.exp")
              
              # إعدادات KasmVNC وتوجيهه لاستخدام الشهادات الجديدة
              kasm_config = """network:
            protocol: http
            websocket_port: 8444
            ssl:
              require_ssl: false
              pem_certificate: /home/runner/.vnc/kasmvnc.pem
              pem_private_key: /home/runner/.vnc/kasmvnc.key
          """
              with open(os.path.expanduser('~/.vnc/kasmvnc.yaml'), 'w') as f:
                  f.write(kasm_config)
                  
              xstartup = """#!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          xsetroot -solid black
          openbox-session &
          """
              with open(os.path.expanduser('~/.vnc/xstartup'), 'w') as f:
                  f.write(xstartup)
              os.system('chmod +x ~/.vnc/xstartup')
              
              # تشغيل خادم VNC
              os.system(f'vncserver -kill :{disp1.display} >/dev/null 2>&1')
              os.system(f'vncserver :{disp1.display} -geometry 720x1280 -depth 24')
              
              subprocess.Popen(['unclutter', '-idle', '0', '-display', f":{disp1.display}"])
              
              cf_log = open("cloudflared.log", "w")
              cf_proc = subprocess.Popen(['./cloudflared', 'tunnel', '--url', 'http://localhost:8444'], stderr=cf_log)
              
              print("⏳ Waiting for Live Control Tunnel to generate link...", flush=True)
              cf_url = None
              for _ in range(15):
                  time.sleep(2)
                  try:
                      with open("cloudflared.log", "r") as f:
                          urls = re.findall(r'https://[a-zA-Z0-9-]+.trycloudflare.com', f.read())
                          if urls:
                              cf_url = urls[-1]
                              break
                  except:
                      pass
              
              if cf_url:
                  print("\n" + "="*60, flush=True)
                  print(f"🎮 رابــــط الـتـحـكــــم الـلـحـظـــي (KasmVNC WebRTC):", flush=True)
                  print(f"👉 {cf_url}", flush=True)
                  print(f"🔑 كلمة المرور (Username/Password): kasm_user / 123456", flush=True)
                  print("="*60 + "\n", flush=True)
              else:
                  print("⚠️ Could not fetch Cloudflare link. Please check cloudflared logs.", flush=True)
              
              ffmpeg_proc = None
              fan_process = None
              driver1 = None
              
              print(f"🎯 Target Stream Duration: {duration} seconds.", flush=True)

              try:
                  opts = Options()
                  opts.add_argument('--no-sandbox')
                  opts.add_argument('--disable-dev-shm-usage')
                  opts.add_argument('--autoplay-policy=no-user-gesture-required')
                  opts.add_argument('--disable-notifications')
                  opts.add_argument('--disable-infobars')
                  opts.add_argument('--disable-extensions')
                  opts.add_argument('--disable-popup-blocking')
                  opts.add_argument('--disable-features=TranslateUI')
                  opts.add_argument('--disable-gpu')
                  opts.add_argument('--disable-software-rasterizer')
                  opts.add_argument('--memory-pressure-off')
                  opts.add_argument('--disable-background-timer-throttling')
                  opts.add_argument('--disable-renderer-backgrounding')
                  opts.add_argument('--disable-backgrounding-occluded-windows')
                  opts.add_experimental_option("excludeSwitches", ["enable-automation"])
                  opts.add_experimental_option('useAutomationExtension', False)
                  opts.add_argument('--disable-blink-features=AutomationControlled')
                  opts.add_argument('--hide-scrollbars')
                  opts.add_argument('--kiosk')

                  driver1 = webdriver.Chrome(options=opts)
                  
                  print("🎙️ Opening Listener in background...", flush=True)
                  driver1.get("http://187.127.73.17:8000/listener")
                  time.sleep(3)
                  
                  try:
                      driver1.find_element(By.ID, 'unlock-btn').click()
                      print("✅ Listener Audio Context Activated.", flush=True)
                  except:
                      pass
                  
                  driver1.execute_script("window.open('');")
                  driver1.switch_to.window(driver1.window_handles[1])

                  separator = "&" if "?" in apps_script_url else "?"
                  trigger_url = f"{apps_script_url}{separator}nocache={int(time.time())}"
                  if stream_title:
                      trigger_url += f"&title={urllib.parse.quote(stream_title)}"
                      
                  driver1.get(trigger_url)
                  time.sleep(10)
                  
                  target_url, status = get_stream_config(stream_index)
                  if target_url:
                      driver1.get(target_url)
                      time.sleep(8)

                  fan_cmd = [
                      'ffplay', '-f', 'lavfi', 
                      '-i', f'anoisesrc=a={FAN_VOLUME}:c=pink,lowpass=f=800,tremolo=f=0.04:d=0.6', 
                      '-nodisp', '-loop', '0', '-loglevel', 'quiet'
                  ]
                  fan_env = os.environ.copy()
                  fan_env['PULSE_SINK'] = sink_name
                  fan_process = subprocess.Popen(fan_cmd, env=fan_env)

                  ffmpeg_cmd = [
                      'ffmpeg', '-y',
                      '-nostats', '-loglevel', 'error',
                      '-thread_queue_size', '1024',
                      '-f', 'x11grab',
                      '-draw_mouse', '0',
                      '-framerate', '60',
                      '-video_size', '720x1280',
                      '-i', f":{disp1.display}",
                      '-thread_queue_size', '1024',
                      '-f', 'pulse',
                      '-i', f"{sink_name}.monitor",
                      '-map', '0:v',
                      '-map', '1:a',
                      '-vf', 'fps=60,drawbox=x=0:y=1152:w=720:h=128:color=black:t=fill',
                      '-c:v', 'libx264',
                      '-preset', 'ultrafast',
                      '-tune', 'zerolatency',
                      '-x264-params', 'threads=2:sliced-threads=1',
                      '-max_muxing_queue_size', '1024',
                      '-b:v', '3000k',
                      '-maxrate', '3000k',
                      '-bufsize', '6000k',
                      '-r', '60',
                      '-g', '120',
                      '-keyint_min', '120',
                      '-sc_threshold', '0',
                      '-pix_fmt', 'yuv420p',
                      '-c:a', 'aac',
                      '-b:a', '128k',
                      '-f', 'flv',
                      f"rtmp://a.rtmp.youtube.com/live2/{youtube_key}"
                  ]

                  ffmpeg_proc = subprocess.Popen(ffmpeg_cmd)
                  active_wait(driver1, duration, stream_index)

              except Exception as e:
                  print(f"Stream encountered an error: {e}", flush=True)
              finally:
                  if fan_process: fan_process.terminate()
                  if ffmpeg_proc: ffmpeg_proc.kill()
                  if cf_proc: cf_proc.terminate()
                  try:
                      if driver1: driver1.quit()
                  except:
                      pass
                  disp1.stop()
                  print("🛑 Stream ended successfully.", flush=True)

          if __name__ == "__main__":
              ENABLE_STREAM = os.environ.get('ENABLE_STREAM', '1') == '1'
              current_key = os.environ.get('R1')
              
              if ENABLE_STREAM and current_key:
                  try:
                      with open("hashtag.txt", "r") as f:
                          hashtag_num = int(f.read().strip())
                  except:
                          hashtag_num = 32
                      
                  stream_title = f"Snake game breaks world record #{hashtag_num}"
                  
                  random_index = 1
                  try:
                      res = requests.get(f"{MASTER_CONTROL_URL}?t={int(time.time())}", timeout=10)
                      valid_lines = [l.strip() for l in res.text.strip().split('\n') if l.strip()]
                      if valid_lines:
                          random_index = random.randint(1, len(valid_lines))
                  except:
                      pass

                  _, init_status = get_stream_config(random_index)
                  
                  if init_status != "0":
                      start_stream(current_key, "Sink1", random_index, APPS_SCRIPT_URL, TOTAL_SESSION_TIME, stream_title=stream_title)
                      
                      with open("hashtag.txt", "w") as f:
                          f.write(str(hashtag_num + 1))
              else:
                  print(f"⚠️ Stream key for R1 is missing or stream is disabled.", flush=True)
          EOF

      - name: Run Streaming Script
        env:
          PYTHONUNBUFFERED: 1
          R1: ${{ secrets.R1 }}
          ENABLE_STREAM: ${{ env.ENABLE_STREAM }}
        run: python main.py

      - name: 💾 Commit Updated State Files
        if: always()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add hashtag.txt
          git commit -m "Update stream hashtag" || echo "No changes to commit"
          git push
