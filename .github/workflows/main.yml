name: Perpetual Dual Stream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-session]

concurrency:
  group: streaming-group
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # تحديد أقصى مدة للوظيفة بـ 6 ساعات لضمان عمل جلسة الـ 5 ساعات براحة
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: System Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg pulseaudio google-chrome-stable unclutter > /dev/null
          pulseaudio -D --exit-idle-time=-1 --disallow-exit || true
          pactl load-module module-null-sink sink_name=Sink1

      - name: Python Setup
        run: pip install selenium pyvirtualdisplay requests

      - name: Create Python Script
        run: |
          cat << 'EOF' > main.py
          import os, subprocess, time, requests, signal, random
          from pyvirtualdisplay import Display
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By

          # إعدادات البث الأول
          URL1_CONTROL = "https://meja.do.am/work/url1.txt"
          APPS_SCRIPT_URL1 = "https://script.google.com/macros/s/AKfycbyCHeVYLYsPGV-F95iiYStOXsgbYM1H92ZGEvveA7r3hq93A0AfiS1WQnnN8l3R7GLA/exec"
          
          # إعدادات البث الثاني
          URL2_CONTROL = "https://meja.do.am/work/url2.txt"
          APPS_SCRIPT_URL2 = "https://script.google.com/macros/s/AKfycbwdVaCnCfcwFVnyY1wEOOWQawopiDTDEzfS2wcPMhWAG3VBHNJ-4AAwIKX80NjBWaMJ/exec"

          # مدة الجلسة الكلية بالثواني (5 ساعات)
          TOTAL_SESSION_TIME = 5 * 3600 

          def kill_all(signum, frame):
              os._exit(0)

          signal.signal(signal.SIGTERM, kill_all)
          signal.signal(signal.SIGINT, kill_all)

          def get_url_from_file(control_url):
              try:
                  res = requests.get(f"{control_url}?t={int(time.time())}", timeout=5)
                  lines = [l.strip() for l in res.text.strip().split('\n') if l.strip()]
                  for line in lines:
                      parts = line.split()
                      if len(parts) >= 2 and parts[1] == "1":
                          return parts[0]
              except:
                  pass
              return None

          def active_wait(driver, duration, control_url=None):
              start_time = time.time()
              last_url = driver.current_url
              while time.time() - start_time < duration:
                  try:
                      driver.find_element(By.TAG_NAME, 'body').click()
                  except:
                      pass
                  if control_url:
                      new_url = get_url_from_file(control_url)
                      if new_url and new_url != last_url:
                          driver.delete_all_cookies()
                          driver.execute_script("window.localStorage.clear();")
                          driver.execute_script("window.sessionStorage.clear();")
                          driver.execute_cdp_cmd('Network.clearBrowserCache', {})
                          driver.execute_cdp_cmd('Network.clearBrowserCookies', {})
                          driver.get(new_url)
                          last_url = new_url
                  time.sleep(3)

          def start_stream(youtube_key, kick_key, sink_name, control_url, apps_script_url, initial_delay=0):
              try:
                  print(f"Triggering Google Apps Script to create a new stream... ({apps_script_url})")
                  requests.get(apps_script_url, timeout=60, allow_redirects=True)
                  print("Apps Script triggered. Waiting for stream to be ready...")
                  time.sleep(10)
              except Exception as e:
                  print(f"Error triggering Apps Script: {e}")

              if initial_delay > 0:
                  time.sleep(initial_delay)
              
              width, height = 720, 1280
              os.environ['PULSE_SINK'] = sink_name
              disp = Display(visible=0, size=(width, height), backend='xvfb')
              disp.start()
              subprocess.Popen(['unclutter', '-idle', '0'])
              ffmpeg_proc = None
              
              # توليد مدة البث العشوائية: بين 1 ساعة و 40 دقيقة (6000 ثانية) و 2 ساعة و 15 دقيقة (8100 ثانية)
              stream_duration = random.randint(6000, 8100)
              print(f"🎯 Target Stream Duration: {stream_duration} seconds ({stream_duration/60:.2f} minutes).")

              try:
                  target_url = get_url_from_file(control_url)
                  if target_url:
                      opts = Options()
                      opts.add_argument('--no-sandbox')
                      opts.add_argument('--disable-dev-shm-usage')
                      opts.add_argument('--autoplay-policy=no-user-gesture-required')
                      opts.add_argument('--disable-notifications')
                      opts.add_argument('--disable-infobars')
                      opts.add_argument('--disable-extensions')
                      opts.add_argument('--disable-popup-blocking')
                      opts.add_argument('--disable-features=TranslateUI')
                      opts.add_argument('--disable-gpu')
                      opts.add_experimental_option("excludeSwitches", ["enable-automation"])
                      opts.add_experimental_option('useAutomationExtension', False)
                      opts.add_argument('--disable-blink-features=AutomationControlled')
                      opts.add_argument('--hide-scrollbars')
                      opts.add_argument(f'--app={target_url}')

                      driver = webdriver.Chrome(options=opts)
                      time.sleep(8)

                      outputs = []
                      if youtube_key:
                          outputs.append(f"[f=flv:onfail=ignore]rtmp://a.rtmp.youtube.com/live2/{youtube_key}")
                      if kick_key:
                          outputs.append(f"[f=flv:onfail=ignore]rtmps://fa723fc1b171.global-contribute.live-video.net/app/{kick_key}")
                      
                      tee_output = "|".join(outputs)

                      ffmpeg_cmd = [
                          'ffmpeg', '-y',
                          '-thread_queue_size', '1024',
                          '-f', 'x11grab',
                          '-framerate', '60',
                          '-s', f'{width}x{height}',
                          '-i', f":{disp.display}",
                          '-f', 'pulse',
                          '-i', f"{sink_name}.monitor",
                          '-c:v', 'libx264',
                          '-preset', 'ultrafast',
                          '-tune', 'zerolatency',
                          '-b:v', '4000k',
                          '-maxrate', '4000k',
                          '-bufsize', '8000k',
                          '-r', '60',
                          '-g', '120',
                          '-keyint_min', '120',
                          '-sc_threshold', '0',
                          '-pix_fmt', 'yuv420p',
                          '-c:a', 'aac',
                          '-b:a', '128k',
                          '-map', '0:v',
                          '-map', '1:a',
                          '-f', 'tee',
                          tee_output
                      ]

                      ffmpeg_proc = subprocess.Popen(ffmpeg_cmd)
                      
                      # الانتظار والمراقبة حتى انتهاء المدة العشوائية للبث
                      active_wait(driver, stream_duration, control_url)
              finally:
                  # إيقاف البث وإغلاق كل شيء يخص الفيديوهات
                  if ffmpeg_proc:
                      ffmpeg_proc.kill()
                  try:
                      driver.quit()
                  except:
                      pass
                  disp.stop()
                  print("🛑 Stream ended successfully.")

          if __name__ == "__main__":
              session_start = time.time()
              
              R1 = os.environ.get('R1')
              R2 = os.environ.get('R2')
              KICK_KEY = os.environ.get('KICK_KEY')
              
              # ----- البث الأول -----
              if R1 or KICK_KEY:
                  print("▶️ Starting First Stream...")
                  start_stream(R1, KICK_KEY, "Sink1", URL1_CONTROL, APPS_SCRIPT_URL1, 0)
              
              # ----- فترة الانتظار العشوائية بين البثين -----
              if R2:
                  # الانتظار بين 10 إلى 20 دقيقة (600 إلى 1200 ثانية)
                  wait_time = random.randint(600, 1200)
                  print(f"⏳ Waiting for {wait_time} seconds ({wait_time/60:.2f} minutes) before starting the second stream...")
                  time.sleep(wait_time)
                  
                  # ----- البث الثاني -----
                  print("▶️ Starting Second Stream...")
                  # نقوم بتمرير R2 و URL2_CONTROL و APPS_SCRIPT_URL2 (تم تمرير None كقيمة للـ Kick إلا إذا كنت ترغب بتشغيله مرة أخرى)
                  start_stream(R2, None, "Sink1", URL2_CONTROL, APPS_SCRIPT_URL2, 0)
              
              # حساب الوقت المتبقي لإكمال 5 ساعات (لمنع إنشاء بثوث جديدة في نفس الجلسة)
              elapsed = time.time() - session_start
              remaining = TOTAL_SESSION_TIME - elapsed
              
              if remaining > 0:
                  print(f"⏳ Waiting for {remaining:.0f} seconds to finish the 5-hour session limit...")
                  while remaining > 0:
                      # النوم لمدة 60 ثانية في كل دورة
                      time.sleep(min(60, remaining))
                      remaining -= 60
                      # طباعة رسالة كل 10 دقائق لتجنب قيام جيت هب بإنهاء العملية بسبب الخمول
                      if int(remaining) % 600 < 60 and remaining > 0:
                          print(f"🔄 Session active... {int(remaining)} seconds left before restart.")
              
              print("✅ 5-hour session completed. Ready to trigger restart.")
          EOF

      - name: Run Streaming Script
        env:
          R1: ${{ secrets.R1 }}
          R2: ${{ secrets.R2 }}
          KICK_KEY: ${{ secrets.KICK_KEY }}
        run: python main.py

      - name: Wait & Restart
        if: always()
        run: |
          # إرسال طلب لإعادة بدء الجلسة لـ 5 ساعات جديدة
          curl -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart-session"}'
